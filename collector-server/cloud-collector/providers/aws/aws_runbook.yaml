  - name: "Resource_Sync_ECS_Task_State_Change"
    actions_only: true  # bookkeeping rule: run actions, do NOT emit a downstream event
    # ECS emits 5-7 state change events per task lifecycle (PROVISIONING →
    # PENDING → ACTIVATING → RUNNING → DEACTIVATING → STOPPING → STOPPED).
    # update_cloud_resource fetches the current state from AWS each time, so
    # collapsing a burst into one immediate + one trailing call still reflects
    # the final state. 30s covers a typical lifecycle without holding the
    # latest state much longer than that.
    dedup_ttl_seconds: 30
    triggers:
      source: "AWS_EventBridge"
      alert_name: "aws.ecs"
      event_filters:
        - template: '{{ eq (index .Event "detailType") "ECS Task State Change" }}'
          description: "ECS task state change from customer EventBridge"
    event_template:
      title:
        template: "ECS Task {{ (index .Detail \"taskArn\") | str | splitList \"/\" | last }} → {{ (index .Detail \"lastStatus\") }}"
      severity: "Info"
      description:
        template: "ECS task {{ (index .Detail \"taskArn\") }} changed to {{ (index .Detail \"lastStatus\") }}"
      status: "Closed"
      fingerprint:
        # Task-level (taskArn). See note on ECS_Task_All_Events_EventBridge above.
        template: "ecs-task:{{ (index .Detail \"taskArn\") }}"
      resource_id:
        template: "{{ (index .Detail \"taskArn\") }}"
      resource_service_name:
        value: "AmazonECS"
      resource_region:
        template: "{{ (index .Event \"region\") }}"
    actions:
      - name: "update_ecs_task_resource"
        type: "update_cloud_resource"
        params:
          resource_id: "{{ (index .Detail \"taskArn\") }}"
          service_name: "AmazonECS"
          resource_type: "task"
          region: "{{ (index .Event \"region\") }}"
          status_mapping:
            PROVISIONING: "Active"
            PENDING: "Active"
            ACTIVATING: "Active"
            RUNNING: "Active"
            DEACTIVATING: "Inactive"
            STOPPING: "Inactive"
            DEPROVISIONING: "Inactive"
            STOPPED: "Inactive"
            DEPROVISIONED: "Deleted"
          new_status: "{{ (index .Detail \"lastStatus\") }}"
          update_last_seen: true
          update_meta: true
          meta_updates:
            last_status: "{{ (index .Detail \"lastStatus\") }}"
            desired_status: "{{ (index .Detail \"desiredStatus\") }}"
            stopped_reason: "{{ (index .Detail \"stoppedReason\") }}"
        description: "Update cloud_resourses table for ECS task"

