  - name: "CloudWatch_Alarm_State_Change_Generic"
    triggers:
      source: "AWS_EventBridge"
      alert_name: "aws.cloudwatch"
      event_filters:
        - template: '{{ eq (index .Event "detailType") "CloudWatch Alarm State Change" }}'
          description: "Event is a CloudWatch Alarm State Change"
        # Process both ALARM and OK states to track transitions
        - template: '{{ $state := (index .Detail "state" "value") }}{{ or (eq $state "ALARM") (eq $state "OK") }}'
          description: "Alarm state is ALARM or OK (track state changes)"
    event_template:
      event_name:
        template: "{{ (index .Detail \"alarmName\") }}"
      title:
        template: |
          {{ $alarmName := (index .Detail "alarmName") }}
          {{ $state := (index .Detail "state" "value") }}
          {{ $previousState := (index .Detail "previousState" "value") }}
          CloudWatch Alarm: {{ $alarmName }} ({{ $previousState }} → {{ $state }})
      fingerprint:
        # Unified with the polling path fingerprint
        # (aws_cloudwatch_alarms_common.go:438) so the same logical alarm
        # arriving via either ingestion path collapses to one chain.
        template: "arn:aws:cloudwatch:{{ (index .Event \"region\") }}:{{ (index .Event \"account\") }}:alarm:{{ (index .Detail \"alarmName\") }}"
      severity:
        template: |
          {{ $state := (index .Detail "state" "value") }}
          {{ if eq $state "ALARM" }}Error{{ else if eq $state "OK" }}Info{{ else }}Warning{{ end }}
      description:
        template: >-
          CloudWatch Alarm '{{ (index .Detail "alarmName") }}' changed from
          {{ (index .Detail "previousState" "value") }} to {{ (index .Detail "state" "value") }}.
          {{ $namespace := "" }}
          {{ $metricName := "" }}
          {{ $metrics := (index .Detail "configuration" "metrics") }}
          {{ if $metrics }}
            {{ $firstMetric := index $metrics 0 }}
            {{ if $firstMetric }}
              {{ $metricStat := (index $firstMetric "metricStat") }}
              {{ if $metricStat }}
                {{ $metric := (index $metricStat "metric") }}
                {{ if $metric }}
                  {{ $namespace = (index $metric "namespace") | str }}
                  {{ $metricName = (index $metric "name") | str }}
                {{ end }}
              {{ end }}
            {{ end }}
          {{ end }}
          Namespace: {{ $namespace }}.
          Metric: {{ $metricName }}.
          Reason: {{ (index .Detail "state" "reason") }}.
      status:
        template: |
          {{ $state := (index .Detail "state" "value") }}
          {{ if eq $state "ALARM" }}FIRING{{ else }}RESOLVED{{ end }}
      resource_id:
        # Simple default — Go post-processing (EnrichCloudWatchAlarm) overrides
        # with authoritative dimension-based resource identification.
        template: "{{ (index .Detail \"alarmName\") }}"
      resource_type:
        value: "alarm"
      resource_service_name:
        value: "cloudwatch"
      resource_region:
        template: "{{ (index .Event \"region\") }}"
      labels:
        # Most labels (aws_event_arn, aws_event_name, aws_event_state, aws_event_instance,
        # aws_event_metric_*, aws_event_alarm_dimensions, aws_dim_*, aws_account, etc.)
        # are set by Go post-processing via EnrichCloudWatchAlarm.
        # Only EventBridge-specific fields that don't exist in the polling path are kept here.
        aws_event_previous_state:
          template: "{{ (index .Detail \"previousState\" \"value\") }}"
        aws_event_state_reason:
          template: "{{ (index .Detail \"state\" \"reason\") }}"
        aws_event_state_timestamp:
          template: "{{ (index .Detail \"state\" \"timestamp\") }}"
    actions:
      - name: "get_cloudwatch_metric_data_on_alarm"
        type: "aws_get_metric"
        description: "Fetch metric data for the alarming metric"
        params:
          namespace:
            template: |
              {{ $namespace := "" }}
              {{ $metrics := (index .Detail "configuration" "metrics") }}
              {{ if $metrics }}
                {{ $firstMetric := index $metrics 0 }}
                {{ if $firstMetric }}
                  {{ $metricStat := (index $firstMetric "metricStat") }}
                  {{ if $metricStat }}
                    {{ $metric := (index $metricStat "metric") }}
                    {{ if $metric }}
                      {{ $namespace = (index $metric "namespace") | str }}
                    {{ end }}
                  {{ end }}
                {{ end }}
              {{ end }}
              {{ $namespace }}
          metric_name:
            template: |
              {{ $metricName := "" }}
              {{ $metrics := (index .Detail "configuration" "metrics") }}
              {{ if $metrics }}
                {{ $firstMetric := index $metrics 0 }}
                {{ if $firstMetric }}
                  {{ $metricStat := (index $firstMetric "metricStat") }}
                  {{ if $metricStat }}
                    {{ $metric := (index $metricStat "metric") }}
                    {{ if $metric }}
                      {{ $metricName = (index $metric "name") | str }}
                    {{ end }}
                  {{ end }}
                {{ end }}
              {{ end }}
              {{ $metricName }}
          period_seconds: 300
          statistic: "Average"
          start_time_offset: "-1h"
          end_time_offset: "+5m"
          region: "{{ (index .Event \"region\") }}"

