- name: pr-lifecycle-check
  webhook: '{{SERVICE_API_SERVER_URL}}/rpc-cron'
  # Backstop only. Primary trigger is /api/webhooks/github (GitHub App
  # webhooks fan out to ProcessOpenPRResolution within seconds). This
  # hourly sweep catches missed deliveries and runs the 6h recovery clause
  # for iteration-capped rows. Matches the 60-min per-row cooldown in
  # adapter/pr_lifecycle.go.
  schedule: '0 * * * *'
  payload: {}
  headers:
    - name: X-ACTION-TOKEN
      value_from_env: ACTION_API_SERVER_TOKEN
  retry_conf:
    num_retries: 0
    retry_interval_seconds: 10
    timeout_seconds: 180
    tolerance_seconds: 21600
  comment: Backstop for missed GitHub webhooks; primary trigger is /api/webhooks/github
