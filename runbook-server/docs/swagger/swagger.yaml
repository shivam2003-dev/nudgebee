basePath: /
definitions:
  api.HealthResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
info:
  contact: {}
  description: 'Runbook server — manages workflows, executions, configs, approvals,
    and RPC action entry points for Nudgebee. Docs are auto-merged: handlers with
    godoc annotations get rich entries; everything else is stubbed from the gin route
    table.'
  title: Nudgebee Runbook API
  version: "1.0"
paths:
  /health:
    get:
      description: Returns 200 OK when the runbook-server process is up. Does not
        verify Temporal/Postgres/RabbitMQ.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.HealthResponse'
      summary: Liveness probe
      tags:
      - system
securityDefinitions:
  ActionToken:
    description: Internal service-to-service auth token. Default header name (configurable
      via `action_api_server_token_header`); value is the `action_api_server_token`
      config value.
    in: header
    name: X-ACTION-TOKEN
    type: apiKey
swagger: "2.0"
