name: test-long-running-workflow
definition:
  inputs:
    - id: mode
      default: "sleep"
  triggers:
    - type: manual
  tasks:
    - id: task-print
      if: "{{ Inputs.mode == 'print' }}"
      type: core.print
      params:
        message: "Instant completion"
    - id: task-wait
      if: "{{ Inputs.mode == 'sleep' }}"
      type: core.approval
      params:
        message: "Waiting indefinitely for cancellation"
