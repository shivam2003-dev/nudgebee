# Dependabot configuration for nudgebee-oss.
#
# Currently paused during the OSS dry-run (open-pull-requests-limit: 0
# on every entry). To re-enable, remove the open-pull-requests-limit
# lines from each entry — the grouping config is already in place so
# routine (minor + patch) updates per directory will bundle into a
# single weekly PR. Majors remain individual.
#
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # ── Python services ────────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/notifications-server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0  # paused during dry-run; remove this line to re-enable
    groups:
      routine-updates:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
