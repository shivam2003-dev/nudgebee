name: Relay Server CI

on:
  workflow_dispatch:
  pull_request:
    branches: ['main']
    paths:
      - collector-server/k8s-collector/relay-server/**
      - .github/workflows/relay-server-test.yaml

jobs:
  app-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26.x']

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          working-directory: ./collector-server/k8s-collector/relay-server
          args: --timeout 20m
