name: RAG-Server CI

on:
  workflow_dispatch:
  pull_request:
    branches: ['main']
    paths:
      - llm/rag-server/**
      - .github/workflows/rag-server.yaml

jobs:
  app-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies with uv
        working-directory: ./llm/rag-server
        run: |
          # Verify and install from lock file first
          uv pip install --system -r uv.lock
          
          # Install in editable mode with all extras for testing and linting
          uv pip install --system -e ".[dev,test]"

      - name: Run linters
        working-directory: ./llm/rag-server
        run: |
          black --check .
          flake8 .
          mypy ./**/*.py --namespace-packages
