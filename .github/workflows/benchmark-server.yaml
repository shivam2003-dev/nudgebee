name: Benchmark-Server CI

on:
  workflow_dispatch:
  pull_request:
    branches: ['main']
    paths:
      - llm/benchmark/**
      - .github/workflows/benchmark-server.yaml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13

      - name: Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "llm/benchmark/uv.lock"

      - name: Install dependencies with uv
        working-directory: ./llm/benchmark
        run: |
          # Verify and install from lock file first
          uv pip install --system -r uv.lock

          # Install in editable mode
          uv pip install --system -e .

      - name: Check formatting
        working-directory: ./llm/benchmark
        run: python -m black --check benchmark_server

      - name: Run lint
        working-directory: ./llm/benchmark
        run: python -m flake8 benchmark_server

      - name: Run unit tests
        working-directory: ./llm/benchmark
        run: python -m pytest benchmark_server/tests
