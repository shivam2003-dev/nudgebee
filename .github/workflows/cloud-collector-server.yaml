name: cloud-collector-server CI

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths:
      - collector-server/cloud-collector/**
      - .github/workflows/cloud-collector-server.yaml
      - deploy/kubernetes/cloud-collector-server/**

jobs:
  lint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: ["1.26.x"]

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: ./collector-server/cloud-collector/go.sum

      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('collector-server/cloud-collector/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Local build for CI
        working-directory: ./collector-server/cloud-collector
        run: |
          go build -o cloud-collector-server ./cmd/*.go

      - name: GolangCI Lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: collector-server/cloud-collector
          args: --timeout 20m
