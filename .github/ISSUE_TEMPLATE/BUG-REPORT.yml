name: "🐛 Bug Report"
description: Report a bug or unexpected behavior.
title: "🐛 [BUG] - <title>"
labels: ["bug", "needs-triage"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I've searched existing issues and didn't find a duplicate.
        - label: I've tried reproducing on the latest `main` (where possible).

  - type: dropdown
    id: components
    attributes:
      label: Affected component(s)
      description: Which part of the system is this about? Pick all that apply.
      multiple: true
      options:
        - app (UI)
        - api-server
        - llm-server
        - ml-k8s-server
        - notifications-server
        - ticket-server
        - runbook-server
        - collector-server
        - code-analysis
        - rag-server
        - relay-server
        - services-server
        - workflow-server
        - infra / deploy
        - docs
        - other / unsure
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release tag, branch name, or commit SHA you're running. Helps a lot — please fill in if you can.
      placeholder: e.g. v0.1.2, main@a1b2c3d
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what's wrong.
      placeholder: Brief description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: reprod
    attributes:
      label: Reproduction steps
      description: Steps to reproduce the issue.
      value: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: Frequency
      description: How often does this happen?
      options:
        - Always
        - Sometimes
        - Once
        - Unknown
    validations:
      required: false

  - type: input
    id: reprod-url
    attributes:
      label: Reproduction URL
      description: If you have a minimal repo or gist that reproduces the issue, link it here.
      placeholder: ex. https://github.com/USERNAME/REPO-NAME
    validations:
      required: false

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output. Auto-formatted as code, no need for backticks.
      render: bash
    validations:
      required: false

  - type: dropdown
    id: browsers
    attributes:
      label: Browsers (UI only)
      description: Which browsers did you see this on? Skip for backend bugs.
      multiple: true
      options:
        - Firefox
        - Chrome
        - Safari
        - Microsoft Edge
        - Opera
        - Other
        - Not applicable
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: OS
      description: What operating system are you running on?
      multiple: true
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: false
