apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "nudgebee-qdrant-server.fullname" . }}
  labels:
    {{- include "nudgebee-qdrant-server.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "nudgebee-qdrant-server.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "nudgebee-qdrant-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "nudgebee-qdrant-server.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "nudgebee-qdrant-server.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: qdrant
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.httpPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
          {{- if .Values.startupProbe }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: storage
              mountPath: {{ .Values.persistence.mountPath }}
          {{- if .Values.config }}
          env:
            {{- if .Values.config.storage }}
            {{- if .Values.config.storage.on_disk_payload }}
            - name: QDRANT__STORAGE__ON_DISK_PAYLOAD
              value: "true"
            {{- end }}
            {{- if .Values.config.storage.optimizers }}
            {{- if .Values.config.storage.optimizers.indexing_threshold_kb }}
            - name: QDRANT__STORAGE__OPTIMIZERS__INDEXING_THRESHOLD_KB
              value: "{{ .Values.config.storage.optimizers.indexing_threshold_kb }}"
            {{- end }}
            {{- if .Values.config.storage.optimizers.memmap_threshold_kb }}
            - name: QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD_KB
              value: "{{ .Values.config.storage.optimizers.memmap_threshold_kb }}"
            {{- end }}
            {{- end }}
            {{- end }}
            {{- if .Values.config.performance }}
            {{- if .Values.config.performance.max_optimization_threads }}
            - name: QDRANT__PERFORMANCE__MAX_OPTIMIZATION_THREADS
              value: "{{ .Values.config.performance.max_optimization_threads }}"
            {{- end }}
            {{- end }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: storage
        labels:
          {{- include "nudgebee-qdrant-server.labels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
  {{- end }}
