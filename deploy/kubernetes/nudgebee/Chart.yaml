apiVersion: v2
name: nudgebee
type: application
version: '0.2'
appVersion: 'V0.2'
dependencies:
  - name: postgresql
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled
    version: '13.2.25'
  - name: clickhouse
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: clickhouse.enabled
    version: '4.1.14'
  - name: rabbitmq
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: rabbitmq.enabled
    version: '12.6.1'
  - name: redis
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: redis.enabled
    version: '17.11.8'
  - name: services-server
    version: '0.1.0'
    repository: file://../services-server/
  - name: k8s-collector
    version: '0.1'
    repository: file://../k8s-collector/
  - name: relay-server
    version: '0.1.0'
    repository: file://../relay-server/
  - name: notifications
    condition: notifications.enabled
    version: '0.1.0'
    repository: file://../notifications/
  - name: ticket-server
    version: '0.1.0'
    condition: ticket-server.enabled
    repository: file://../ticket-server/
  - name: ml-k8s-server
    version: '0.1'
    condition: ml-k8s-server.enabled
    repository: file://../ml-k8s-server/
  - name: app
    version: '0.1'
    repository: file://../app/
  - name: llm-server
    version: '0.1'
    condition: llm-server.enabled
    repository: file://../llm-server/
  - name: rag-server
    version: '0.1'
    condition: rag-server.enabled
    repository: file://../rag-server/
  - name: cloud-collector-server
    version: '0.1'
    condition: cloud-collector-server.enabled
    repository: file://../cloud-collector-server/
  - name: nudgebee-qdrant-server
    version: '1.0.0'
    condition: nudgebee-qdrant-server.enabled
    repository: file://../nudgebee-qdrant-server/
  - name: temporal
    repository: https://go.temporal.io/helm-charts
    condition: temporal.enabled
    version: '0.72.0'
  - name: workflow-server
    version: '0.1.0'
    condition: workflow-server.enabled
    repository: file://../workflow-server/
