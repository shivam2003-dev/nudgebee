global:
  image:
    registry: 'ghcr.io/nudgebee'
  imagePullSecrets: []
  initImages:
    postgres: 'ghcr.io/nudgebee/postgres:16.10-alpine'
    curl: 'ghcr.io/nudgebee/curl:8.10.1'
  existingNudgebeeSecretName: ''
nudgebee_registry_secret:
  enabled: false
  username: 'nudgebee'
  password: ''
  existingSecretName: ''
nudgebee_secret:
  BASE_URL: 'http://localhost:3000'
  EMAIL_FROM: ''
  EMAIL_SERVER_HOST: ''
  EMAIL_SERVER_PASSWORD: ''
  EMAIL_SERVER_USER: ''
  APP_DATABASE_URL: 'postgresql://postgres:password@postgresql:5432/postgres?sslmode=disable'
  # Note: If you change APP_DATABASE_URL, ensure you also update the 'temporal.server.config.persistence' section below
  # to match the host, port, user, and SSL settings.
  # NUDGEBEE_ENCRYPTION_KEY encrypts DB-stored integration credentials and similar
  # at-rest secrets. MUST be set per install (the chart fails if empty or left as
  # __REPLACE__) — regenerating it after data is written makes previously-encrypted
  # rows unreadable, so generate once and store securely. Generate with:
  # openssl rand -hex 32
  NUDGEBEE_ENCRYPTION_KEY: '__REPLACE__'
  NUDGEBEE_LICENSE: ''
  RELAY_SERVER_SECRET_KEY: ''
  AWS_TEMPLATE_URL: 'https://nudgebee-prod-documents.s3.amazonaws.com/nudgebee-aws-cloud-formation.json'
  NUDGEBEE_INSTANCE_ROLE: ''
  AWS_ORG_TEMPLATE_URL: ''
  AWS_ORG_SNS_TOPIC_ARN: ''
  CLOUD_COLLECTOR_ORG_REGISTRATION_SQS: ''
  CLOUD_COLLECTOR_AWS_EVENTBRIDGE_SQS: ''
  NEXTAUTH_DUMMY_CREDS_ENABLED: true
  TEMPORAL_DB_PASSWORD: 'password'
  TEMPORAL_GRPC_ENDPOINT: 'temporal-frontend:7233'

  # ------------------------------------------------------------------
  # Open-source / on-prem configuration knobs.
  # All defaults preserve the existing Nudgebee SaaS behavior; only set
  # these when running an OSS fork or a single-tenant on-prem deployment.
  # ------------------------------------------------------------------

  # RSA public key for verifying NUDGEBEE_LICENSE JWTs (commercial / on-prem).
  # Leave empty for OSS — getLicenseDetails() short-circuits to licenseType='free'.
  LICENSE_PUBLIC_KEY: ''

  # Azure AD application (client) ID for /.well-known/microsoft-identity-association.json.
  # Leave empty for OSS / dev — the endpoint will return an empty associations array.
  MICROSOFT_IDENTITY_APPLICATION_ID: ''

  # Contact address rendered in the marketplace on-prem / license-only response
  # HTML pages. When unset, the page degrades to a generic "team will get in touch"
  # line with no mailto link.
  MARKETPLACE_CONTACT_EMAIL: ''

  # Public origin of the app, used as a fallback for OAuth redirect URIs and
  # email links when BASE_URL is not set.
  NEXT_PUBLIC_APP_URL: ''

  # Base URL of the public docs site, used by in-app "Learn more" links.
  # Empty value lets the app fall back to its baked-in default (https://docs.nudgebee.com).
  NEXT_PUBLIC_DOCS_URL: ''

  # Default Docker image registry pre-filled in the K8s installer modal.
  # OSS deployments should set this to 'ghcr.io/nudgebee' (or your own
  # mirror). The app has no baked-in fallback — if this is empty, the
  # installer modal will show "undefined" in the placeholder. EE installs
  # override to their internal registry via values-enterprise.yaml.
  NEXT_PUBLIC_DEFAULT_IMAGE_REGISTRY: 'ghcr.io/nudgebee'


postgresql:
  enabled: true
  fullnameOverride: postgresql
  auth:
    existingSecret: 'postgresql'
    database: 'postgres'
  # Bitnami postgresql chart 13.2.25 defaults primary.persistence.size to 8Gi
  # (see charts/postgresql-13.2.25.tgz values.yaml). 8Gi fills quickly under
  # real workloads; bump the default PVC request to 50Gi. Note: resizing an
  # already-bound PVC requires the underlying StorageClass to allow expansion.
  primary:
    persistence:
      size: 50Gi
  # Pin to the GHCR mirror of bitnami/postgresql:16.1.0-debian-11-r16.
  # Same tag the bitnami chart 13.2.25 already defaults to, but the original
  # docker.io/bitnami/postgresql path was deprecated in Bitnami's mid-2025
  # sunset (images moved to docker.io/bitnamilegacy/*). Without this override
  # the chart's default image-pull 404s.
  image:
    registry: 'ghcr.io/nudgebee'
    repository: postgresql
    tag: '16.1.0-debian-11-r16'
  metrics:
    enabled: true
    image:
      registry: 'ghcr.io/nudgebee'
      repository: postgres-exporter
      tag: '0.15.0-debian-11-r3'
    serviceMonitor:
      enabled: true
    prometheusRule:
      enabled: true
      additionalRules:
        - name: postgres.rules
          groups:
            - name: postgres.rules
              rules:
                - alert: PostgresInstanceDown
                  expr: up{job="postgresql"} == 0
                  for: 2m
                  labels:
                    severity: critical
                  annotations:
                    summary: 'PostgreSQL instance is down'
                    description: 'No metrics received from PostgreSQL (instance: {{ $labels.instance }})'

                - alert: PostgresTooManyConnections
                  expr: pg_stat_activity_count{job="postgresql"} > 100
                  for: 5m
                  labels:
                    severity: warning
                  annotations:
                    summary: 'PostgreSQL too many connections'
                    description: 'Instance {{ $labels.instance }} has over 100 active connections'

                - alert: PostgresReplicationLag
                  expr: pg_replication_lag{job="postgresql"} > 10000000
                  for: 5m
                  labels:
                    severity: warning
                  annotations:
                    summary: 'PostgreSQL replication lag detected'
                    description: 'Replication lag on {{ $labels.instance }} > 10MB'

                - alert: PostgresLongRunningQuery
                  expr: pg_stat_activity_max_tx_duration_seconds{job="postgresql"} > 300
                  for: 5m
                  labels:
                    severity: warning
                  annotations:
                    summary: 'Long-running query'
                    description: 'A query has been running > 5 minutes on {{ $labels.instance }}'

clickhouse:
  enabled: false
  fullnameOverride: clickhouse
  shards: 2
  replicaCount: 1
  auth:
    existingSecret: 'clickhouse'
    existingSecretKey: 'admin-password'
redis:
  enabled: true
  fullnameOverride: redis
  # Pin to the GHCR mirror — bitnami chart 17.11.8 defaults at
  # docker.io/bitnami/redis are dead since Bitnami's mid-2025 sunset
  # (moved to docker.io/bitnamilegacy/*).
  image:
    registry: 'ghcr.io/nudgebee'
    repository: redis
    tag: 7.0.12-debian-11-r0
  auth:
    password: 'password'
    existingSecret: 'redis'
    existingSecretPasswordKey: 'redis-password'
  replica:
    replicaCount: 0
rabbitmq:
  enabled: true
  fullnameOverride: rabbitmq
  image:
    registry: 'ghcr.io/nudgebee'
    repository: rabbitmq
    tag: 3.13.7-debian-12-r5-nb-3
  extraConfiguration: |-
    consumer_timeout = 3600000
  auth:
    password: 'password'
    securePassword: false
    existingPasswordSecret: 'rabbitmq'
    existingErlangSecret: 'rabbitmq'
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      path: /metrics/per-object
    prometheusRule:
      enabled: true
      rules:
        - alert: RabbitmqNodeDown
          expr: 'sum(rabbitmq_build_info{namespace="{{ .Release.Namespace }}"}) < {{ .Values.replicaCount }}'
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: RabbitMQ node down
            description: 'Less than {{ .Values.replicaCount }} nodes running in RabbitMQ cluster'
        - alert: RabbitmqInstancesDifferentVersions
          expr: 'count(count(rabbitmq_build_info{namespace="{{ .Release.Namespace }}"}) by (rabbitmq_version)) > 1'
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: RabbitMQ instances different versions
            description: 'Running different version of RabbitMQ in the same cluster, can lead to failure.'
        - alert: RabbitmqMemoryHigh
          expr: 'rabbitmq_process_resident_memory_bytes{namespace="{{ .Release.Namespace }}"} / rabbitmq_resident_memory_limit_bytes{namespace="{{ .Release.Namespace }}"} * 100 > 90'
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: RabbitMQ memory high
            description: 'A node use more than 90% of allocated RAM'

        - alert: RabbitmqFileDescriptorsUsage
          expr: 'rabbitmq_process_open_fds{namespace="{{ .Release.Namespace }}"} / rabbitmq_process_max_fds{namespace="{{ .Release.Namespace }}"} * 100 > 90'
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: RabbitMQ file descriptors usage
            description: 'A node use more than 90% of file descriptors'

        - alert: RabbitmqTooManyReadyMessages
          expr: 'sum(rabbitmq_queue_messages_ready{namespace="{{ .Release.Namespace }}"}) BY (queue, pod, namespace) > 10'
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: 'RabbitMQ queue {{`{{ $labels.queue }}`}} has too many ready messages'
            description: 'Queue {{`{{ $labels.queue }}`}} in namespace {{`{{ $labels.namespace }}`}} (pod {{`{{ $labels.pod }}`}}) has more than 10 ready messages'

        - alert: RabbitmqTooManyUnackMessages
          expr: 'sum(rabbitmq_queue_messages_unacked{namespace="{{ .Release.Namespace }}"}) BY (queue, pod, namespace) > 10'
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: 'RabbitMQ queue {{`{{ $labels.queue }}`}} has too many unacked messages'
            description: 'Queue {{`{{ $labels.queue }}`}} in namespace {{`{{ $labels.namespace }}`}} (pod {{`{{ $labels.pod }}`}}) has more than 10 unacknowledged messages'

        - alert: RabbitmqTooManyConnections
          expr: 'rabbitmq_connections{namespace="{{ .Release.Namespace }}"} > 100'
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: RabbitMQ too many connections
            description: 'The total connections of a node is too high'

        - alert: RabbitmqNoQueueConsumer
          expr: 'rabbitmq_queue_consumers{namespace="{{ .Release.Namespace }}",queue!~".*(dlq|relay|notifications_delayed).*"} < 1'
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: 'RabbitMQ queue {{`{{ $labels.queue }}`}} has no consumers'
            description: 'Queue {{`{{ $labels.queue }}`}} in namespace {{`{{ $labels.namespace }}`}} (pod {{`{{ $labels.pod }}`}}) has less than 1 consumer'

        - alert: RabbitmqUnroutableMessages
          expr: 'increase(rabbitmq_channel_messages_unroutable_returned_total{namespace="{{ .Release.Namespace }}"}[1m]) > 0 or increase(rabbitmq_channel_messages_unroutable_dropped_total{namespace="{{ .Release.Namespace }}"}[1m]) > 0'
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: RabbitMQ unroutable messages
            description: 'A queue has unroutable messages'
services-server:
  fullnameOverride: services-server
  env:
    NOVA_IMAGE: 'ghcr.io/nudgebee/nova:2026-05-12T15-41-58_3b33692e2739d958a11eb43346c4240a70fd15cd'
    K8S_VERSION_UPGRADE_IMAGE: 'ghcr.io/nudgebee/nova:2026-05-12T15-41-58_3b33692e2739d958a11eb43346c4240a70fd15cd'
    TRIVY_IMAGE: 'ghcr.io/nudgebee/trivy:0.58.0'
    POPEYE_IMAGE: 'ghcr.io/nudgebee/popeye:v0.11.1-nudgebee.1'
    KUBE_BENCH_IMAGE: 'ghcr.io/nudgebee/kube-bench:v0.10.4'
    CERT_SCANNER_IMAGE: 'ghcr.io/nudgebee/cert-scanner:v0.1.0'
k8s-collector:
  fullnameOverride: k8s-collector
relay-server:
  fullnameOverride: relay-server
app:
  fullnameOverride: app
  replicaCount: 1
notifications:
  enabled: true
  fullnameOverride: notifications
ticket-server:
  enabled: true
  fullnameOverride: ticket-server
ml-k8s-server:
  enabled: true
  fullnameOverride: ml-server
postgres_migrations:
  fullnameOverride: postgres_migrations
  image:
    repository: migrations
    tag: latest
llm-server:
  enabled: true
  fullnameOverride: llm-server
  env:
    LLM_SERVER_AGENT_CODEAGENT_IMAGE: 'ghcr.io/nudgebee/code-analysis-agent:latest'
    LLM_SERVER_AGENT_CODEAGENT_IMAGE_PULL_SECRET: ''
rag-server:
  enabled: true
  fullnameOverride: rag-server
cloud-collector-server:
  enabled: true
  fullnameOverride: cloud-collector-server
nudgebee-qdrant-server:
  enabled: true
  fullnameOverride: nudgebee-qdrant-server
  image:
    repository: qdrant/qdrant
    tag: 'v1.16.0'
temporal:
  enabled: true
  fullnameOverride: temporal
  web:
    enabled: true
  admintools:
    enabled: true
  server:
    enabled: true
    replicaCount: 1
    dynamicConfig:
      limit.customSearchAttributes.keyword:
        - value: 100
          constraints: {}
      frontend.validSearchAttributes:
        - value:
            nb_tenant_id: 'Keyword'
            nb_account_id: 'Keyword'
            nb_workflow_id: 'Keyword'
            nb_workflow_trigger: 'Keyword'
            nb_triggered_by: 'Keyword'
            parent_workflow_id: 'Keyword'
            parent_run_id: 'Keyword'
            nb_execution_tags: 'KeywordList'
            nb_event_type: 'Keyword'
            nb_event_id: 'Keyword'
            nb_parent_workflow_id: 'Keyword'
    config:
      namespaces:
        create: true
        namespace:
          - name: default
            retention: 10d
      persistence:
        default:
          driver: 'sql'
          sql:
            driver: 'postgres12'
            host: 'postgresql'
            port: 5432
            database: 'temporal'
            user: 'postgres'
            existingSecret: 'nudgebee-temporal'
            tls:
              enabled: false
              enableHostVerification: false
        visibility:
          driver: 'sql'
          sql:
            driver: 'postgres12'
            host: 'postgresql'
            port: 5432
            database: 'temporal_visibility'
            user: 'postgres'
            existingSecret: 'nudgebee-temporal'
            tls:
              enabled: false
              enableHostVerification: false
  schema:
    createDatabase:
      enabled: true
    setup:
      enabled: true
    update:
      enabled: true
  cassandra:
    enabled: false
  mysql:
    enabled: false
  elasticsearch:
    enabled: false
  prometheus:
    enabled: false
  grafana:
    enabled: false
workflow-server:
  enabled: true
  fullnameOverride: workflow-server
cost-server:
  enabled: true
  fullnameOverride: cost-server
