  # Default Docker image registry pre-filled in the K8s installer modal.
  # Empty value lets the app fall back to its baked-in default (registry.nudgebee.com).
  NEXT_PUBLIC_DEFAULT_IMAGE_REGISTRY: ''


postgresql:
  enabled: true
  fullnameOverride: postgresql
  auth:
    existingSecret: 'postgresql'
    database: 'postgres'
  # Pin to the GHCR mirror of bitnami/postgresql:16.1.0-debian-11-r16.
  # Same tag the bitnami chart 13.2.25 already defaults to, but the original
  # docker.io/bitnami/postgresql path was deprecated in Bitnami's mid-2025
  # sunset (images moved to docker.io/bitnamilegacy/*). Without this override
  # the chart's default image-pull 404s.
  image:
    registry: 'ghcr.io/nudgebee'
    repository: postgresql
    tag: '16.1.0-debian-11-r16'
  metrics:
    enabled: true
    image:
      registry: 'ghcr.io/nudgebee'
      repository: postgres-exporter
      tag: '0.15.0-debian-11-r3'
    serviceMonitor:
      enabled: true
    prometheusRule:
      enabled: true
      additionalRules:
        - name: postgres.rules
          groups:
            - name: postgres.rules
              rules:
                - alert: PostgresInstanceDown
                  expr: up{job="postgresql"} == 0
                  for: 2m
                  labels:
                    severity: critical
                  annotations:
                    summary: 'PostgreSQL instance is down'
                    description: 'No metrics received from PostgreSQL (instance: {{ $labels.instance }})'

                - alert: PostgresTooManyConnections
                  expr: pg_stat_activity_count{job="postgresql"} > 100
                  for: 5m
                  labels:
                    severity: warning
                  annotations:
                    summary: 'PostgreSQL too many connections'
                    description: 'Instance {{ $labels.instance }} has over 100 active connections'

                - alert: PostgresReplicationLag
                  expr: pg_replication_lag{job="postgresql"} > 10000000
                  for: 5m
                  labels:
                    severity: warning
                  annotations:
                    summary: 'PostgreSQL replication lag detected'
                    description: 'Replication lag on {{ $labels.instance }} > 10MB'

                - alert: PostgresLongRunningQuery
                  expr: pg_stat_activity_max_tx_duration_seconds{job="postgresql"} > 300
                  for: 5m
                  labels:
                    severity: warning
                  annotations:
                    summary: 'Long-running query'
                    description: 'A query has been running > 5 minutes on {{ $labels.instance }}'

