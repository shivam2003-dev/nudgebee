  # docker.io/bitnami/redis are dead since Bitnami's mid-2025 sunset
  # (moved to docker.io/bitnamilegacy/*).
  image:
    registry: 'ghcr.io/nudgebee'
    repository: redis
    tag: 7.0.12-debian-11-r0
  auth:
    password: 'password'
    existingSecret: 'redis'
    existingSecretPasswordKey: 'redis-password'
  replica:
    replicaCount: 0
rabbitmq:
  enabled: true
  fullnameOverride: rabbitmq
  image:
    registry: 'ghcr.io/nudgebee'
    repository: rabbitmq
    tag: 3.13.7-debian-12-r5-nb-3
  extraConfiguration: |-
    consumer_timeout = 3600000
  auth:
    password: 'password'
    securePassword: false
    existingPasswordSecret: 'rabbitmq'
    existingErlangSecret: 'rabbitmq'
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      path: /metrics/per-object
    prometheusRule:
      enabled: true
      rules:
        - alert: RabbitmqNodeDown
          expr: 'sum(rabbitmq_build_info{namespace="{{ .Release.Namespace }}"}) < {{ .Values.replicaCount }}'
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: RabbitMQ node down
            description: 'Less than {{ .Values.replicaCount }} nodes running in RabbitMQ cluster'
        - alert: RabbitmqInstancesDifferentVersions
          expr: 'count(count(rabbitmq_build_info{namespace="{{ .Release.Namespace }}"}) by (rabbitmq_version)) > 1'
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: RabbitMQ instances different versions
            description: 'Running different version of RabbitMQ in the same cluster, can lead to failure.'
        - alert: RabbitmqMemoryHigh
          expr: 'rabbitmq_process_resident_memory_bytes{namespace="{{ .Release.Namespace }}"} / rabbitmq_resident_memory_limit_bytes{namespace="{{ .Release.Namespace }}"} * 100 > 90'
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: RabbitMQ memory high
            description: 'A node use more than 90% of allocated RAM'

        - alert: RabbitmqFileDescriptorsUsage
          expr: 'rabbitmq_process_open_fds{namespace="{{ .Release.Namespace }}"} / rabbitmq_process_max_fds{namespace="{{ .Release.Namespace }}"} * 100 > 90'
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: RabbitMQ file descriptors usage
            description: 'A node use more than 90% of file descriptors'

        - alert: RabbitmqTooManyReadyMessages
          expr: 'sum(rabbitmq_queue_messages_ready{namespace="{{ .Release.Namespace }}"}) BY (queue, pod, namespace) > 10'
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: RabbitMQ too many ready messages
            description: 'RabbitMQ too many ready messages'

        - alert: RabbitmqTooManyUnackMessages
          expr: 'sum(rabbitmq_queue_messages_unacked{namespace="{{ .Release.Namespace }}"}) BY (queue, pod, namespace) > 10'
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: RabbitMQ too many unack messages
            description: 'Too many unacknowledged messages'

        - alert: RabbitmqTooManyConnections
          expr: 'rabbitmq_connections{namespace="{{ .Release.Namespace }}"} > 100'
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: RabbitMQ too many connections
            description: 'The total connections of a node is too high'

        - alert: RabbitmqNoQueueConsumer
          expr: 'rabbitmq_queue_consumers < 1'
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: RabbitMQ no queue consumers
            description: 'A queue has less than 1 consumer'

        - alert: RabbitmqUnroutableMessages
          expr: 'increase(rabbitmq_channel_messages_unroutable_returned_total{namespace="{{ .Release.Namespace }}"}[1m]) > 0 or increase(rabbitmq_channel_messages_unroutable_dropped_total{namespace="{{ .Release.Namespace }}"}[1m]) > 0'
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: RabbitMQ unroutable messages
            description: 'A queue has unroutable messages'
