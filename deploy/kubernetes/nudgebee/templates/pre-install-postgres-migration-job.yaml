apiVersion: batch/v1
kind: Job
metadata:
  name: "postgres-migration-job"
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"  
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
        app.kubernetes.io/instance: {{ .Release.Name | quote }}
        helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"      
    spec:
      restartPolicy: Never
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: postgres-migration-job
        image: {{ include "postgresMigrationImageName" . }}
        command: ["bash", "./run-migrations.sh"]
        envFrom:
          - secretRef:
              name: {{ include "nudgebee.secretName" . }}
      initContainers:
        - name: db-check
          image: {{ .Values.global.initImages.postgres }}
          imagePullPolicy: IfNotPresent
          command: ['sh', '-c', 'until pg_isready -h $(echo "$APP_DATABASE_URL" | sed "s/.*@\(.*\):.*/\1/") -U $(echo "$APP_DATABASE_URL" | sed "s/.*:\/\/\([^:]*\):.*/\1/"); do echo "Waiting for PostgreSQL to be ready..."; sleep 2; done;']
          envFrom:
            - secretRef:
                name: {{ include "nudgebee.secretName" . }}
