  {{- if .Values.nudgebee_secret.NEXTAUTH_DUMMY_CREDS_ENABLED }}
  NEXTAUTH_DUMMY_CREDS_ENABLED: {{ "true" | b64enc | quote }}
  {{- else }}
  NEXTAUTH_DUMMY_CREDS_ENABLED: {{ "false" | b64enc | quote }}
  {{- end }}

  {{- if and (kindIs "map" $secret) (hasKey $secret "data") (kindIs "map" $secret.data) (hasKey $secret.data "NEXTAUTH_DUMMY_CREDS_PASSWORD") }}
  NEXTAUTH_DUMMY_CREDS_PASSWORD: {{ index $secret.data "NEXTAUTH_DUMMY_CREDS_PASSWORD" }}
  {{- else }}
  NEXTAUTH_DUMMY_CREDS_PASSWORD: {{ default (randAlphaNum 20) .Values.nudgebee_secret.NEXTAUTH_DUMMY_CREDS_PASSWORD | b64enc | quote }}
  {{- end }}

  {{- if .Values.nudgebee_secret.NEXTAUTH_MAGICLINK_CREDS_ENABLED }}
