E_ENCRYPTION_KEY" 1 "NUDGEBEE_INSTANCE_ROLE" 1 "NUDGEBEE_LICENSE" 1 "OKTA_CLIENT_ID" 1 "OKTA_CLIENT_SECRET" 1 "OKTA_ISSUER" 1 "PENDO_ENABLE" 1 "POSTGRES_PASSWORD" 1 "RABBIT_MQ_ERLANG_COOKIE" 1 "RABBIT_MQ_HOST" 1 "RABBIT_MQ_PASSWORD" 1 "RABBIT_MQ_PORT" 1 "RABBIT_MQ_USER_ONBOARD_QUEUE" 1 "RABBIT_MQ_USERNAME" 1 "RAG_SERVER_URL" 1 "RAG_SERVER_TOKEN" 1 "REDIS_SERVER_HOST" 1 "REDIS_SERVER_PORT" 1 "REDIS_USER_NAME" 1 "REDIS_USER_PASSWORD" 1 "RELAY_SERVER_ENDPOINT" 1 "RELAY_SERVER_SECRET_KEY" 1 "RELAY_WSSERVER_ENDPOINT" 1 "SERVICE_API_SERVER_URL" 1 "SERVICE_PORT" 1 "SIGNING_KEY_ID" 1 "SIGNING_PRIVATE_KEY" 1 "SIGNING_PUBLIC_KEY" 1 "SLACK_AUTH_TYPE" 1 "SLACK_BOT_TOKEN" 1 "SLACK_CHANNEL_ID" 1 "SLACK_CLIENT_ID" 1 "SLACK_CLIENT_SECRET" 1 "SLACK_SIGNING_SECRET" 1 "SLACKER_BASE_URL" 1 "TELEPORT_ATTRIBUTE_GROUPS" 1 "TELEPORT_ATTRIBUTE_NAME" 1 "TELEPORT_ATTRIBUTE_USERNAME" 1 "TELEPORT_AUDIENCE" 1 "TELEPORT_ENABLED" 1 "TELEPORT_ISSUER" 1 "TELEPORT_JWKS_URL" 1 "TELEPORT_SSO_ENABLED" 1 "TEMPORAL_DB_PASSWORD" 1 "TEMPORAL_GRPC_ENDPOINT" 1 "TICKET_SERVICE_URL" 1 "WORKFLOW_SERVER_URL" 1 "LICENSE_PUBLIC_KEY" 1 "MICROSOFT_IDENTITY_APPLICATION_ID" 1 "NEXT_PUBLIC_APP_URL" 1 "NEXT_PUBLIC_DOCS_URL" 1 "NEXT_PUBLIC_DEFAULT_IMAGE_REGISTRY" 1 "MARKETPLACE_CONTACT_EMAIL" 1 "LLM_SERVER_TOKEN" 1 "WORKFLOW_SERVER_TOKEN" 1 "NOTIFICATION_SERVER_TOKEN" 1 "LLM_PROVIDER_API_KEY" 1 "LLM_PROVIDER" 1 "AWS_SECRET_ACCESS_KEY" 1 "AWS_ACCESS_KEY_ID" 1 "ACTION_API_SERVER_URL" 1 "AWS_DEFAULT_REGION" 1 "AZURE_APP_TENANT_ID" 1 "CLOUD_COLLECTOR_GCP_PUBSUB_SUBSCRIPTION_ID" 1 "EMBEDDINGS_PROVIDER_API_KEY" 1 "ETL_DB_URL" 1 "ETL_SERVER_TOKEN" 1 "ETL_SERVER_URL" 1 "GCP_PROJECT_ID" 1 "GCP_PUBSUB_TEMPLATE_URL" 1 "GOOGLE_CHAT_PROJECT_NUMBER" 1 "GRAPHQL_API_ENDPOINT" 1 "MS_TEAMS_BOT_ENDPOINT" 1 "NEXTAUTH_LDAP_SEARCH_PASSWORD" 1 "NEXTAUTH_LDAP_SEARCH_USER_PATTERN" 1 "NUDGEBEE_ENDPOINT" 1 "NUDGEBEE_KEY" 1 "NUDGEBEE_SECRET" 1 "RABBITMQ_USER" 1 "SERPER_API_KEY" 1 -}}
{{- range $k, $v := .Values.nudgebee_secret }}
  {{- if not (hasKey $knownKeys $k) }}
    {{- fail (printf "\n\n[ERROR] Unknown key '%s' found in nudgebee_secret. \nThis key will be silently ignored by the templates.\nIf this is a custom environment variable, please use 'additional_env_vars' instead.\nIf this is a typo, please fix it in your values.yaml.\n" $k) }}
  {{- end }}
{{- end }}
{{- $secret := (lookup "v1" "Secret" .Release.Namespace "nudgebee") | default dict }}
{{- /*
  NUDGEBEE_ENCRYPTION_KEY must be set per install. Lookup-or-generate is unsafe
  here — regenerating wipes access to every previously-encrypted DB row, and
  offline-render GitOps (Argo CD, Flux) would re-roll the key on every reconcile.
  Fail loudly instead.
*/ -}}
{{- if or (not .Values.nudgebee_secret.NUDGEBEE_ENCRYPTION_KEY) (eq .Values.nudgebee_secret.NUDGEBEE_ENCRYPTION_KEY "__REPLACE__") }}
  {{- fail "\n\n[ERROR] NUDGEBEE_ENCRYPTION_KEY is required.\n\nUPGRADERS: If your previous deploy used the chart's old default key (the literal string of 64 zeros, '3030...0'), set NUDGEBEE_ENCRYPTION_KEY=3030303030303030303030303030303030303030303030303030303030303030 to keep your encrypted data readable. Regenerating the key after data is encrypted makes existing rows unreadable.\n\nFRESH INSTALLS: Generate a new key with 'openssl rand -hex 32' and store it securely. The key never changes after first install for a given database — pick once and treat it like a database master password.\n\nSet via:\n  --set nudgebee_secret.NUDGEBEE_ENCRYPTION_KEY=<key>\nor in your values file:\n  nudgebee_secret:\n    NUDGEBEE_ENCRYPTION_KEY: <key>\n" }}
{{- end }}
{{- /*
  ACTION_API_SERVER_TOKEN is safe to rotate (it's a service-to-service shared
  secret with no at-rest dependency). Use lookup-or-generate so fresh installs
  get a unique random value, upgrades reuse what's already in the cluster, and
  explicit overrides (--set / values.yaml / existingSecretName) keep working.
  GitOps caveat: offline render returns empty from `lookup`, which would
  regenerate the token on every reconcile — GitOps users must set the value
  explicitly or use existingSecretName.
*/ -}}
{{- $actionTokenExisting := "" }}
{{- if and $secret.data (index $secret.data "ACTION_API_SERVER_TOKEN") }}
  {{- $actionTokenExisting = index $secret.data "ACTION_API_SERVER_TOKEN" | b64dec }}
{{- end }}
{{- $actionToken := default $actionTokenExisting .Values.nudgebee_secret.ACTION_API_SERVER_TOKEN }}
{{- if not $actionToken }}
  {{- $actionToken = randAlphaNum 64 }}
{{- end }}
{{- /*
  NEXTAUTH_SECRET signs NextAuth session cookies AND the inner HS256 session
  JWT used by nbctl / bearer-flow callers (post-Hasura — see #30685). It must
  NOT share a key with NUDGEBEE_ENCRYPTION_KEY (the previous behavior silently
  fell back to it): a single-key compromise would otherwise break both
  authentication forgery and at-rest credential decryption. Use lookup-or-
  generate so existing installs keep their current value (no surprise
  rotation / forced re-login on upgrade), fresh installs get an independent
  random value, and explicit overrides keep working. Same GitOps caveat as
  ACTION_API_SERVER_TOKEN.
*/ -}}
{{- $nextauthSecretExisting := "" }}
{{- if and $secret.data (index $secret.data "NEXTAUTH_SECRET") }}
  {{- $nextauthSecretExisting = index $secret.data "NEXTAUTH_SECRET" | b64dec }}
{{- end }}
{{- $nextauthSecret := default $nextauthSecretExisting .Values.nudgebee_secret.NEXTAUTH_SECRET }}
{{- if not $nextauthSecret }}
  {{- $nextauthSecret = randAlphaNum 64 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: nudgebee
data:
  NUDGEBEE_LICENSE: {{ .Values.nudgebee_secret.NUDGEBEE_LICENSE | b64enc | quote }}
  ACTION_API_SERVER_TOKEN: {{ $actionToken | b64enc | quote }}
  APP_DATABASE_URL: {{ .Values.nudgebee_secret.APP_DATABASE_URL | b64enc | quote }}
  AUTO_PILOT_DATABASE_URL: {{ default .Values.nudgebee_secret.APP_DATABASE_URL .Values.nudgebee_secret.AUTO_PILOT_DATABASE_URL | b64enc | quote }}
  AUTO_PILOT_URL: {{ default "http://auto-pilot-server:9988" .Values.nudgebee_secret.AUTO_PILOT_URL | b64enc | quote }}
  BASE_URL: {{ .Values.nudgebee_secret.BASE_URL | b64enc | quote }}
  CLICKHOUSE_HOST: {{ default "http://clickhouse:8123" .Values.nudgebee_secret.CLICKHOUSE_HOST | b64enc | quote }}
  CLICKHOUSE_PASSWORD: {{ default "password" .Values.nudgebee_secret.CLICKHOUSE_PASSWORD | b64enc | quote }}
  CLICKHOUSE_USER: {{ default "default" .Values.nudgebee_secret.CLICKHOUSE_USER | b64enc | quote }}
  CLICKHOUSE_ENABLED: {{ default "false" .Values.clickhouse.enabled | b64enc | quote }}
  COLLECTOR_DB_URL: {{ default .Values.nudgebee_secret.APP_DATABASE_URL .Values.nudgebee_secret.COLLECTOR_DB_URL | b64enc | quote }}
  EMAIL_FROM: {{ .Values.nudgebee_secret.EMAIL_FROM | b64enc | quote }}
  EMAIL_SERVER_HOST: {{ .Values.nudgebee_secret.EMAIL_SERVER_HOST | b64enc | quote }}
  EMAIL_SERVER_PASSWORD: {{ .Values.nudgebee_secret.EMAIL_SERVER_PASSWORD | b64enc | quote }}
  EMAIL_SERVER_PORT: {{ default "465" .Values.nudgebee_secret.EMAIL_SERVER_PORT | b64enc | quote }}
  EMAIL_SERVER_USER: {{ .Values.nudgebee_secret.EMAIL_SERVER_USER | b64enc | quote }}
  ENV: {{ default "production" .Values.nudgebee_secret.ENV | b64enc | quote }}
  GOOGLE_CLIENT_ID: {{ default "" .Values.nudgebee_secret.GOOGLE_CLIENT_ID | b64enc | quote }}
  GOOGLE_CLIENT_SECRET: {{ default "" .Values.nudgebee_secret.GOOGLE_CLIENT_SECRET | b64enc | quote }}
  GPT_TOKEN: {{ default "" .Values.nudgebee_secret.GPT_TOKEN | b64enc | quote }}
  NEXTAUTH_SECRET: {{ $nextauthSecret | b64enc | quote }}
  NEXTAUTH_URL: {{ default .Values.nudgebee_secret.BASE_URL .Values.nudgebee_secret.NEXTAUTH_URL | b64enc | quote }}
  NOTIFICATION_DB_URL: {{ default .Values.nudgebee_secret.APP_DATABASE_URL .Values.nudgebee_secret.NOTIFICATION_DB_URL | b64enc | quote }}
  NUDGEBEE_DB: {{ default .Values.nudgebee_secret.APP_DATABASE_URL .Values.nudgebee_secret.NUDGEBEE_DB | b64enc | quote }}
  NUDGEBEE_ENCRYPTION_KEY: {{ .Values.nudgebee_secret.NUDGEBEE_ENCRYPTION_KEY | b64enc | quote }}
  RABBIT_MQ_HOST: {{ default "rabbitmq" .Values.nudgebee_secret.RABBIT_MQ_HOST | b64enc | quote }}
  RABBIT_MQ_PASSWORD: {{ default "password" .Values.nudgebee_secret.RABBIT_MQ_PASSWORD | b64enc | quote }}
  RABBIT_MQ_PORT: {{ default "5672" .Values.nudgebee_secret.RABBIT_MQ_PORT | b64enc | quote }}
  RABBIT_MQ_USERNAME: {{ default "user" .Values.nudgebee_secret.RABBIT_MQ_USERNAME | b64enc | quote }}
  RABBIT_MQ_USER_ONBOARD_QUEUE: {{ default "events_queue" .Values.nudgebee_secret.RABBIT_MQ_USER_ONBOARD_QUEUE | b64enc | quote }}
  {{- if .Values.redis.enabled }}
  CACHE_PROVIDER: {{ default "redis" .Values.nudgebee_secret.CACHE_PROVIDER | b64enc | quote }}
  {{- else if .Values.nudgebee_secret.CACHE_PROVIDER }}
  CACHE_PROVIDER: {{ .Values.nudgebee_secret.CACHE_PROVIDER | b64enc | quote }}
  {{- end }}
  REDIS_SERVER_HOST: {{ default "redis-master" .Values.nudgebee_secret.REDIS_SERVER_HOST | b64enc | quote }}
  REDIS_SERVER_PORT: {{ default "6379" .Values.nudgebee_secret.REDIS_SERVER_PORT | b64enc | quote }}
  REDIS_USER_NAME: {{ default "default" .Values.nudgebee_secret.REDIS_USER_NAME | b64enc | quote }}
  REDIS_USER_PASSWORD: {{ default "password" .Values.nudgebee_secret.REDIS_USER_PASSWORD | b64enc | quote }}
  RELAY_SERVER_ENDPOINT: {{ default "http://relay-server:8080" .Values.nudgebee_secret.RELAY_SERVER_ENDPOINT | b64enc | quote }}
