  AWS_EVENTBRIDGE_ADDON_TEMPLATE_URL: {{ default "https://nudgebee-prod-documents.s3.amazonaws.com/nudgebee-aws-eventbridge-addon.json" .Values.nudgebee_secret.AWS_EVENTBRIDGE_ADDON_TEMPLATE_URL | b64enc | quote }}
  AZURE_ARM_TEMPLATE_URL: {{ default "https://nudgebee-documents-v2.s3.amazonaws.com/nudgebee-azure-arm-template.json" .Values.nudgebee_secret.AZURE_ARM_TEMPLATE_URL | b64enc | quote }}
  AZURE_SERVICE_BUS_RESOURCE_ID: {{ default "" .Values.nudgebee_secret.AZURE_SERVICE_BUS_RESOURCE_ID | b64enc | quote }}

  DEFAULT_LOGO_URL: {{ default "" (coalesce .Values.nudgebee_secret.DEFAULT_LOGO_URL .Values.nudgebee_secret.NEXT_PUBLIC_DEFAULT_LOGO_URL) | b64enc | quote }}
  DEFAULT_FAVICON_URL: {{ default "" (coalesce .Values.nudgebee_secret.DEFAULT_FAVICON_URL .Values.nudgebee_secret.NEXT_PUBLIC_DEFAULT_FAVICON_URL) | b64enc | quote }}
  DEFAULT_TITLE: {{ default "" (coalesce .Values.nudgebee_secret.DEFAULT_TITLE .Values.nudgebee_secret.NEXT_PUBLIC_DEFAULT_TITLE) | b64enc | quote }}
  DEFAULT_ASSISTANT_NAME: {{ default "" (coalesce .Values.nudgebee_secret.DEFAULT_ASSISTANT_NAME .Values.nudgebee_secret.NEXT_PUBLIC_DEFAULT_ASSISTANT_NAME) | b64enc | quote }}
  NEXT_TELEMETRY_DISABLED: {{ "1" | b64enc | quote }}
  PENDO_ENABLE: {{ default "false" .Values.nudgebee_secret.PENDO_ENABLE | b64enc | quote }}
  LLM_SERVER_DB_URL: {{ default .Values.nudgebee_secret.APP_DATABASE_URL .Values.nudgebee_secret.LLM_SERVER_DB_URL | b64enc | quote }}
  RAG_SERVER_URL: {{ default "http://rag-server:9999" .Values.nudgebee_secret.RAG_SERVER_URL | b64enc | quote }}
  RAG_SERVER_TOKEN: {{ default "" .Values.nudgebee_secret.RAG_SERVER_TOKEN | b64enc | quote }}
  TEMPORAL_GRPC_ENDPOINT: {{ default "temporal-frontend:7233" .Values.nudgebee_secret.TEMPORAL_GRPC_ENDPOINT | b64enc | quote }}
  LLM_SERVER_URL: {{ default "http://llm-server:8000" .Values.nudgebee_secret.LLM_SERVER_URL | b64enc | quote }}
  # Optional X-ACTION-TOKEN shared between callers (incl. app rpcGateway) and
  # llm-server's incoming-auth middleware. Empty by default — llm-server's
  # gate is lenient: a missing token is allowed for in-cluster traffic. Set
  # this on both the app + llm-server pods to enforce strict matching, e.g.
  # for clusters that expose llm-server beyond the in-cluster trust boundary.
  LLM_SERVER_TOKEN: {{ default "" .Values.nudgebee_secret.LLM_SERVER_TOKEN | b64enc | quote }}
  # Optional X-ACTION-TOKEN for workflow-server (runbook-server). Empty by
  # default — workflow-server has no incoming-auth middleware today, so the
  # value is simply omitted from outgoing requests when unset. Forward-
  # compatible: if/when the backend adds a strict check, operators set the
  # same value on both the app + workflow-server pods.
  WORKFLOW_SERVER_TOKEN: {{ default "" .Values.nudgebee_secret.WORKFLOW_SERVER_TOKEN | b64enc | quote }}
  # Optional X-ACTION-TOKEN for notifications-server. Same shape as above:
  # empty by default, no incoming middleware today, forward-compatible.
  NOTIFICATION_SERVER_TOKEN: {{ default "" .Values.nudgebee_secret.NOTIFICATION_SERVER_TOKEN | b64enc | quote }}
  # AWS credentials for cloud-collector's AWS provider (used by aws-sdk-go
  # when AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY are present in env).
  # Empty by default — operators set when running AWS scans without IAM
  # Role for Service Account (IRSA) / IMDS-based credentials.
  AWS_ACCESS_KEY_ID: {{ default "" .Values.nudgebee_secret.AWS_ACCESS_KEY_ID | b64enc | quote }}
  AWS_SECRET_ACCESS_KEY: {{ default "" .Values.nudgebee_secret.AWS_SECRET_ACCESS_KEY | b64enc | quote }}
  # LLM provider selection (bedrock / azure / openai / googleai / vertexai)
  # and API key. Read by llm-server, rag-server, and llm/code-analysis.
  # Empty by default — set per deployment.
  LLM_PROVIDER: {{ default "" .Values.nudgebee_secret.LLM_PROVIDER | b64enc | quote }}
  LLM_PROVIDER_API_KEY: {{ default "" .Values.nudgebee_secret.LLM_PROVIDER_API_KEY | b64enc | quote }}
  # ----- Additional per-env / secret values mounted into the nudgebee Secret -----
  # (added in this PR per dev-env reference; empty by default — set per deployment)
  ACTION_API_SERVER_URL: {{ default "" .Values.nudgebee_secret.ACTION_API_SERVER_URL | b64enc | quote }}
  AWS_DEFAULT_REGION: {{ default "" .Values.nudgebee_secret.AWS_DEFAULT_REGION | b64enc | quote }}
  AZURE_APP_TENANT_ID: {{ default "" .Values.nudgebee_secret.AZURE_APP_TENANT_ID | b64enc | quote }}
  CLOUD_COLLECTOR_GCP_PUBSUB_SUBSCRIPTION_ID: {{ default "" .Values.nudgebee_secret.CLOUD_COLLECTOR_GCP_PUBSUB_SUBSCRIPTION_ID | b64enc | quote }}
  EMBEDDINGS_PROVIDER_API_KEY: {{ default "" .Values.nudgebee_secret.EMBEDDINGS_PROVIDER_API_KEY | b64enc | quote }}
  ETL_DB_URL: {{ default "" .Values.nudgebee_secret.ETL_DB_URL | b64enc | quote }}
  ETL_SERVER_TOKEN: {{ default "" .Values.nudgebee_secret.ETL_SERVER_TOKEN | b64enc | quote }}
  ETL_SERVER_URL: {{ default "" .Values.nudgebee_secret.ETL_SERVER_URL | b64enc | quote }}
  GCP_PROJECT_ID: {{ default "" .Values.nudgebee_secret.GCP_PROJECT_ID | b64enc | quote }}
  GCP_PUBSUB_TEMPLATE_URL: {{ default "" .Values.nudgebee_secret.GCP_PUBSUB_TEMPLATE_URL | b64enc | quote }}
  GOOGLE_CHAT_PROJECT_NUMBER: {{ default "" .Values.nudgebee_secret.GOOGLE_CHAT_PROJECT_NUMBER | b64enc | quote }}
  GRAPHQL_API_ENDPOINT: {{ default "" .Values.nudgebee_secret.GRAPHQL_API_ENDPOINT | b64enc | quote }}
  MS_TEAMS_BOT_ENDPOINT: {{ default "" .Values.nudgebee_secret.MS_TEAMS_BOT_ENDPOINT | b64enc | quote }}
  NEXTAUTH_LDAP_SEARCH_PASSWORD: {{ default "" .Values.nudgebee_secret.NEXTAUTH_LDAP_SEARCH_PASSWORD | b64enc | quote }}
  NEXTAUTH_LDAP_SEARCH_USER_PATTERN: {{ default "" .Values.nudgebee_secret.NEXTAUTH_LDAP_SEARCH_USER_PATTERN | b64enc | quote }}
  NUDGEBEE_ENDPOINT: {{ default "" .Values.nudgebee_secret.NUDGEBEE_ENDPOINT | b64enc | quote }}
  NUDGEBEE_KEY: {{ default "" .Values.nudgebee_secret.NUDGEBEE_KEY | b64enc | quote }}
  NUDGEBEE_SECRET: {{ default "" .Values.nudgebee_secret.NUDGEBEE_SECRET | b64enc | quote }}
  RABBITMQ_USER: {{ default "" .Values.nudgebee_secret.RABBITMQ_USER | b64enc | quote }}
  SERPER_API_KEY: {{ default "" .Values.nudgebee_secret.SERPER_API_KEY | b64enc | quote }}
  WORKFLOW_SERVER_URL: {{ default "http://workflow-server:8000" .Values.nudgebee_secret.WORKFLOW_SERVER_URL | b64enc | quote }}
  LICENSE_PUBLIC_KEY: {{ default "" .Values.nudgebee_secret.LICENSE_PUBLIC_KEY | b64enc | quote }}
  MICROSOFT_IDENTITY_APPLICATION_ID: {{ default "" .Values.nudgebee_secret.MICROSOFT_IDENTITY_APPLICATION_ID | b64enc | quote }}
  MARKETPLACE_CONTACT_EMAIL: {{ default "" .Values.nudgebee_secret.MARKETPLACE_CONTACT_EMAIL | b64enc | quote }}
  NEXT_PUBLIC_APP_URL: {{ default "" .Values.nudgebee_secret.NEXT_PUBLIC_APP_URL | b64enc | quote }}
  NEXT_PUBLIC_DOCS_URL: {{ default "" .Values.nudgebee_secret.NEXT_PUBLIC_DOCS_URL | b64enc | quote }}
  NEXT_PUBLIC_DEFAULT_IMAGE_REGISTRY: {{ default "" .Values.nudgebee_secret.NEXT_PUBLIC_DEFAULT_IMAGE_REGISTRY | b64enc | quote }}
  # GitHub App credentials: required for agent_code PR creation and the
  # /api/webhooks/github receiver. Leave blank for installs that don't
  # use the GitHub integration.
  GITHUB_APP_ID: {{ default "" .Values.nudgebee_secret.GITHUB_APP_ID | b64enc | quote }}
  GITHUB_PRIVATE_KEY: {{ default "" .Values.nudgebee_secret.GITHUB_PRIVATE_KEY | b64enc | quote }}
  GITHUB_WEBHOOK_SECRET: {{ default "" .Values.nudgebee_secret.GITHUB_WEBHOOK_SECRET | b64enc | quote }}
  {{- if .Values.additional_env_vars }}
  {{- range $key, $value := .Values.additional_env_vars }}
  {{- if $value }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
type: Opaque
{{- end }}
