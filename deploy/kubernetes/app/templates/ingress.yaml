{{- if .Values.ingress.enabled -}}
{{- $fullName := include "app.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
{{- if semverCompare ">=1.19-0" .Capabilities.KubeVersion.GitVersion -}}
apiVersion: networking.k8s.io/v1
{{- else if semverCompare ">=1.14-0" .Capabilities.KubeVersion.GitVersion -}}
apiVersion: networking.k8s.io/v1beta1
{{- else -}}
apiVersion: extensions/v1beta1
{{- end }}
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }} 
  {{- end }}
spec:
  {{- if and .Values.ingress.className (semverCompare ">=1.18-0" .Capabilities.KubeVersion.GitVersion) }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - backend:
              service:
                name: services-server
                port:
                  number: 8000
            path: /api/webhooks/prometheus-alertmanager
            pathType: ImplementationSpecific
          - backend:
              service:
                name: services-server
                port:
                  number: 8000
            path: /api/webhooks/datadog
            pathType: ImplementationSpecific
          - backend:
              service:
                name: services-server
                port:
                  number: 8000
            path: /api/webhooks/azure-monitor
            pathType: ImplementationSpecific
          - backend:
              service:
                name: notifications
                port:
                  number: 8080
            path: /webhooks/slack/events
            pathType: ImplementationSpecific
          - backend:
              service:
                name: services-server
                port:
                  number: 8000
            path: /api/webhooks/pagerduty
            pathType: ImplementationSpecific
          - backend:
              service:
                name: services-server
                port:
                  number: 8000
            path: /api/webhooks/servicenow
            pathType: ImplementationSpecific
          - backend:
              service:
                name: services-server
                port:
                  number: 8000
            path: /api/webhooks/newrelic
            pathType: ImplementationSpecific
          - backend:
              service:
                name: services-server
                port:
                  number: 8000
            path: /api/webhooks/workflow
            pathType: ImplementationSpecific
          - backend:
              service:
                name: services-server
                port:
                  number: 8000
            path: /api/webhooks/zenduty
            pathType: ImplementationSpecific
          - backend:
              service:
                name: services-server
                port:
                  number: 8000
            path: /api/webhooks/grafana
            pathType: ImplementationSpecific
          - backend:
              service:
                name: services-server
                port:
                  number: 8000
            path: /api/webhooks/splunk
            pathType: ImplementationSpecific
          - backend:
              service:
                name: services-server
                port:
                  number: 8000
            path: /api/webhooks/gcp-monitoring
            pathType: ImplementationSpecific
          - backend:
              service:
                name: services-server
                port:
                  number: 8000
            path: /api/webhooks/dynatrace
            pathType: ImplementationSpecific
          - backend:
              service:
                name: services-server
                port:
                  number: 8000
            path: /api/webhooks/solarwinds
            pathType: ImplementationSpecific
          - backend:
              service:
                name: services-server
                port:
                  number: 8000
            path: /api/webhooks/azure-eventgrid
            pathType: ImplementationSpecific
          - backend:
              service:
                name: services-server
                port:
                  number: 8000
            path: /api/webhooks/github
            pathType: ImplementationSpecific
            {{- range .paths }}
          - path: {{ .path }}
            {{- if and .pathType (semverCompare ">=1.18-0" $.Capabilities.KubeVersion.GitVersion) }}
            pathType: {{ .pathType }}
            {{- end }}
            backend:
              {{- if semverCompare ">=1.19-0" $.Capabilities.KubeVersion.GitVersion }}
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
              {{- else }}
              serviceName: {{ $fullName }}
              servicePort: {{ $svcPort }}
              {{- end }}
          {{- end }}
    {{- end }}
{{- end }}