apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: llm-server-role
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "deletecollection"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: llm-server-role-binding
subjects:
  - kind: ServiceAccount
    name: {{ include "llm-server.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: llm-server-role
  apiGroup: rbac.authorization.k8s.io
