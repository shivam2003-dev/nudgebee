# -- The number of replicas (pods) to launch
replicaCount: 1

serverPort: 5000

global:
  image:
    registry: 'ghcr.io/nudgebee'
  imagePullSecrets: []
  initImages:
    postgres: 'ghcr.io/nudgebee/postgres:16.10-alpine'
    curl: 'ghcr.io/nudgebee/curl:8.10.1'

image:
  # -- Name of the image repository to pull the container image from.
  repository: nudgebee-k8s-collector
  # -- [Image pull policy](https://kubernetes.io/docs/concepts/containers/images/#updating-images) for updating already existing images on a node.
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: 'latest'
# -- Reference to one or more secrets to be used when [pulling images](https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/#create-a-pod-that-uses-your-secret) (from private registries).
imagePullSecrets: []
# -- A name in place of the chart name for `app:` labels.
nameOverride: ''
# -- A name to substitute for the full names of resources.
fullnameOverride: ''

serviceAccount:
  # -- Specifies whether a service account should be created.
  create: false
  # -- Annotations to add to the service account.
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ''

# -- Labels to be added to pods.
podLabels: {}

# -- Annotations to be added to pods.
podAnnotations: {}

# -- Pod [security context](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod).
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#security-context) for details.
podSecurityContext:
  {}
  # fsGroup: 2000

# -- Container [security context](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container).
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#security-context-1) for details.
securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  # -- Kubernetes [service type](https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types).
  type: ClusterIP
  # -- Service port.
  port: 80
  # -- Annotations to be added to the service.
  annotations: {}

ingress:
  # -- Enable [ingress](https://kubernetes.io/docs/concepts/services-networking/ingress/).
  enabled: false
  # -- Ingress [class name](https://kubernetes.io/docs/concepts/services-networking/ingress/#ingress-class).
  className: 'nginx'
  # -- Annotations to be added to the ingress.
  annotations:
    cert-manager.io/issuer: cert-letsencrypt-issuer
    nginx.ingress.kubernetes.io/force-ssl-redirect: 'true'

  # -- Ingress host configuration.
  # @default -- See [values.yaml](values.yaml).
  hosts: []
  # -- Ingress TLS configuration.
  # @default -- See [values.yaml](values.yaml).
  tls: []

# -- Container resource [requests and limits](https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/).
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#resources) for details.
# @default -- No requests or limits.
resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    #cpu: 100m
    memory: 1500Mi
  requests:
    #cpu: 100m
    memory: 1500Mi

# -- Autoscaling by resources
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 70

# -- [Node selector](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#nodeselector) configuration.
nodeSelector: {}

# -- [Tolerations](https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/) for node taints.
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#scheduling) for details.
tolerations: []

# -- [Affinity](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity) configuration.
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#scheduling) for details.
affinity: {}

# -- extraEnvVarsCM append to ConfigMap with extra environment variables. See [values.yaml](values.yaml).
## E.g:
## extraEnvVarsCM:
##   ENV_STORE_IN_CONFIGMAP: value
extraEnvVarsCM: {}

# -- extraEnvVarsSecret append to Secret with extra environment variables. See [values.yaml](values.yaml).
## E.g:
## extraEnvVarsSecret:
##   ENV_STORE_IN_SECRET: value
extraEnvVarsSecret: {}

secretName: 'nudgebee'

annotations: {}

# -- Metrics configuration
metrics:
  # -- Enable Prometheus metrics collection
  enabled: false

  # -- ServiceMonitor configuration (requires Prometheus Operator)
  serviceMonitor:
    # -- Enable ServiceMonitor resource creation
    enabled: true

    # -- Metrics scrape interval
    interval: 30s

    # -- Metrics scrape timeout
    scrapeTimeout: 10s

    # -- Additional labels for ServiceMonitor
    labels: {}

    # -- Additional annotations for ServiceMonitor
    annotations: {}

    # -- RelabelConfigs to apply to samples before scraping
    # https://github.com/prometheus-operator/prometheus-operator/blob/main/Documentation/api.md#relabelconfig
    relabelings: []

# -- Dual mode configuration for separate server and worker deployments
# Only applied when dualMode.enabled is true. When false, runs in traditional combined mode.
dualMode:
  # -- Enable dual mode deployment (server + worker)
  # Default: false (maintains backward compatibility)
  enabled: false
  
  # -- Worker deployment configuration (only when dualMode.enabled: true)
  worker:
    # -- Number of worker replicas
    replicaCount: 1
    
    # -- Worker autoscaling configuration
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 70
    
    # -- Worker resource requirements (defaults to main resources if not specified)
    resources: {}
    #  limits:
    #    memory: 1Gi
    #  requests:
    #    memory: 512Mi
    
    # -- Worker specific tolerations (defaults to main tolerations if not specified)
    tolerations: []
    
    # -- Worker service configuration
    service:
      # -- Service type for worker pods
      type: ClusterIP
      # -- Service annotations for worker service
      annotations: {}
      # -- Service ports for worker pods (empty by default - workers don't expose HTTP)
      ports: []
      # Example for metrics endpoint:
      # ports:
      #   - name: metrics
      #     port: 8080
      #     targetPort: 8080
      #     protocol: TCP
