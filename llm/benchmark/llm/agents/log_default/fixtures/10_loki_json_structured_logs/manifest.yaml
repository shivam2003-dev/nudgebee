apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporting-worker
spec:
  replicas: 1
  selector: {matchLabels: {app: reporting-worker}}
  template:
    metadata:
      labels: {app: reporting-worker}
    spec:
      containers:
      - name: emitter
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
          - |
            n=0
            while true; do
              n=$((n+1))
              echo "{\"timestamp\":\"$(date -Iseconds)\",\"level\":\"INFO\",\"service\":\"reporting-worker\",\"trace_id\":\"t-$n\",\"duration_ms\":42,\"msg\":\"report-generated\"}" >> /var/log/app/app.log
              if [ $((n % 5)) -eq 0 ]; then
                echo "{\"timestamp\":\"$(date -Iseconds)\",\"level\":\"ERROR\",\"service\":\"reporting-worker\",\"trace_id\":\"t-$n\",\"duration_ms\":15000,\"msg\":\"warehouse-query-timeout\"}" >> /var/log/app/app.log
              fi
              sleep 2
            done
        volumeMounts:
        - name: applogs
          mountPath: /var/log/app
      - name: promtail
        image: grafana/promtail:2.9.0
        args: ["-config.file=/etc/promtail/promtail-config.yaml"]
        volumeMounts:
        - name: promtail-config
          mountPath: /etc/promtail
        - name: applogs
          mountPath: /var/log/app
      volumes:
      - name: applogs
        emptyDir: {}
      - name: promtail-config
        configMap:
          name: promtail-config
