apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
data:
  promtail-config.yaml: |
    server:
      http_listen_port: 9080
    positions:
      filename: /tmp/positions.yaml
    clients:
      - url: http://loki:3100/loki/api/v1/push
    scrape_configs:
      - job_name: reporting-worker
        static_configs:
          - targets: [localhost]
            labels:
              namespace: log-default-10
              app: reporting-worker
              __path__: /var/log/app/*.log
        pipeline_stages:
          - json:
              expressions:
                level:      level
                service:    service
                trace_id:   trace_id
                duration_ms: duration_ms
          - labels:
              level:
              service:
