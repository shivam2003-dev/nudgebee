apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-api
spec:
  replicas: 1
  selector: {matchLabels: {app: billing-api}}
  template:
    metadata:
      labels: {app: billing-api}
    spec:
      containers:
      - name: emitter
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
          - |
            while true; do
              echo "$(date -Iseconds) app=billing-api status=200 path=/invoice" >> /var/log/app/app.log
              echo "$(date -Iseconds) app=billing-api status=500 path=/invoice err=db-deadlock" >> /var/log/app/app.log
              sleep 2
            done
        volumeMounts:
        - name: applogs
          mountPath: /var/log/app
      - name: promtail
        image: grafana/promtail:2.9.0
        args: ["-config.file=/etc/promtail/promtail-config.yaml"]
        volumeMounts:
        - name: promtail-config
          mountPath: /etc/promtail
        - name: applogs
          mountPath: /var/log/app
      volumes:
      - name: applogs
        emptyDir: {}
      - name: promtail-config
        configMap:
          name: promtail-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping-api
spec:
  replicas: 1
  selector: {matchLabels: {app: shipping-api}}
  template:
    metadata:
      labels: {app: shipping-api}
    spec:
      containers:
      - name: emitter
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
          - |
            while true; do
              echo "$(date -Iseconds) app=shipping-api status=200 path=/ship" >> /var/log/app/app.log
              echo "$(date -Iseconds) app=shipping-api status=500 path=/ship err=carrier-unreachable" >> /var/log/app/app.log
              sleep 2
            done
        volumeMounts:
        - name: applogs
          mountPath: /var/log/app
      - name: promtail
        image: grafana/promtail:2.9.0
        args: ["-config.file=/etc/promtail/promtail-config.yaml"]
        volumeMounts:
        - name: promtail-config
          mountPath: /etc/promtail
        - name: applogs
          mountPath: /var/log/app
      volumes:
      - name: applogs
        emptyDir: {}
      - name: promtail-config
        configMap:
          name: promtail-config
