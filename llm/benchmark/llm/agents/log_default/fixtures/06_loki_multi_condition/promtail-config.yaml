apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
data:
  promtail-config.yaml: |
    server:
      http_listen_port: 9080
    positions:
      filename: /tmp/positions.yaml
    clients:
      - url: http://loki:3100/loki/api/v1/push
    scrape_configs:
      - job_name: ns-log-default-06
        static_configs:
          - targets: [localhost]
            labels:
              namespace: log-default-06
              __path__: /var/log/app/*.log
        pipeline_stages:
          - regex:
              expression: 'app=(?P<app>\S+) .*status=(?P<status>\d+)'
          - labels:
              app:
              status:
