apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
spec:
  replicas: 1
  selector:
    matchLabels: {app: orders-api}
  template:
    metadata:
      labels: {app: orders-api}
    spec:
      containers:
      - name: emitter
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
          - |
            while true; do
              echo "$(date -Iseconds) INFO  order_id=$RANDOM status=created" >> /var/log/app/app.log
              echo "$(date -Iseconds) ERROR order_id=$RANDOM status=failed reason=inventory-locked" >> /var/log/app/app.log
              sleep 3
            done
        volumeMounts:
        - name: applogs
          mountPath: /var/log/app
      - name: promtail
        image: grafana/promtail:2.9.0
        args:
          - -config.file=/etc/promtail/promtail-config.yaml
        volumeMounts:
        - name: promtail-config
          mountPath: /etc/promtail
        - name: applogs
          mountPath: /var/log/app
      volumes:
      - name: applogs
        emptyDir: {}
      - name: promtail-config
        configMap:
          name: promtail-config
