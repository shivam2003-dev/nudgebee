user_prompt: "Show me the logs for payment-processing-worker in namespace log-default-04 and explain the failure."
description: |
  Fallback-through-provider path. A Loki endpoint is configured for this namespace but
  NOTHING is pushing to it (no promtail), so logs_default will retry twice, hit "no
  logs found" both times, return Status=Failed, and the parent logAgent must fall
  through to kubectl_log — which can read the crashed container's logs and answer
  correctly. This exercises the empty-result → kubectl handoff.
expected_output: |
  The response explains the container is crashing because DEPLOY_ENV is undefined,
  citing the message 'Environment variable DEPLOY_ENV is undefined'. The final
  answer must arrive via the kubectl_log fallback (because Loki returned no logs),
  proving the empty-result → fallback handoff works end-to-end.
setup_timeout: 240
before_test: |
  set -e
  kubectl create namespace log-default-04 || true
  kubectl label namespace log-default-04 benchmark=true --overwrite || true

  # Loki only — no promtail — so no logs will be ingested.
  kubectl apply -f ../../../nubi/shared/loki.yaml -n log-default-04
  kubectl wait --for=condition=ready pod -l app=loki -n log-default-04 --timeout=120s

  # Deploy a deterministically crashing pod so kubectl_log has something to read.
  cat <<'EOF' | kubectl apply -f -
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: payment-processing-worker
    namespace: log-default-04
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: payment-processing-worker
    template:
      metadata:
        labels:
          app: payment-processing-worker
      spec:
        containers:
        - name: payment-processing-container
          image: busybox:1.36
          command: ["/bin/sh"]
          args: ["-c", "if [ -z \"${DEPLOY_ENV}\" ]; then echo 'Environment variable DEPLOY_ENV is undefined'; exit 1; else while true; do echo hello; sleep 10; done; fi"]
  EOF
  kubectl wait --for=jsonpath='{.status.containerStatuses[0].state.waiting.reason}'=CrashLoopBackOff \
    pod -l app=payment-processing-worker -n log-default-04 --timeout=300s || exit 1

  pkill -f "kubectl port-forward.*svc/loki" 2>/dev/null || true
  sleep 1
  nohup kubectl port-forward -n log-default-04 svc/loki 3100:3100 \
    >/tmp/pf-log-default-04.log 2>&1 &
  echo $! > /tmp/pf-log-default-04.pid
  for i in {1..30}; do
    if curl -s http://localhost:3100/ready | grep -q ready; then break; fi
    sleep 1
  done
after_test: |
  if [ -f /tmp/pf-log-default-04.pid ]; then
    kill $(cat /tmp/pf-log-default-04.pid) 2>/dev/null || true
    rm -f /tmp/pf-log-default-04.pid
  fi
  pkill -f "kubectl port-forward.*log-default-04" 2>/dev/null || true
  kubectl delete namespace log-default-04 --wait=false || true
tags:
  - medium
  - kubernetes
  - loki
  - fallback-handoff
