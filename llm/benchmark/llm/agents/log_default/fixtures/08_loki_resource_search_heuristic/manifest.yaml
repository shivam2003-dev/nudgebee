# Deployment label 'app=notification-dispatcher' but the user will ask about
# 'app notif-disp' — a short slug that requires resource-search to resolve.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-dispatcher
  labels:
    app: notification-dispatcher
    short-name: notif-disp
spec:
  replicas: 1
  selector: {matchLabels: {app: notification-dispatcher}}
  template:
    metadata:
      labels:
        app: notification-dispatcher
        short-name: notif-disp
    spec:
      containers:
      - name: emitter
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
          - |
            while true; do
              echo "$(date -Iseconds) ERROR smtp-relay-refused recipient=ops@example.com" >> /var/log/app/app.log
              sleep 2
            done
        volumeMounts:
        - name: applogs
          mountPath: /var/log/app
      - name: promtail
        image: grafana/promtail:2.9.0
        args: ["-config.file=/etc/promtail/promtail-config.yaml"]
        volumeMounts:
        - name: promtail-config
          mountPath: /etc/promtail
        - name: applogs
          mountPath: /var/log/app
      volumes:
      - name: applogs
        emptyDir: {}
      - name: promtail-config
        configMap:
          name: promtail-config
