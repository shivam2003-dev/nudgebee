# Historical-log honesty test. Nubi connects to cluster Loki rather than a
# per-test Loki instance, so backdated Aug 2025 entries for app-100a are not
# reachable from the agent's queries. The fixture is scoped to the fallback
# path: with no matching data in cluster Loki, the agent must honestly report
# "no data found" and explain what it queried — accepted as a valid answer
# by expected_output below. Avoids wasting ~5 min/run on per-test Loki setup
# and the log-ingestion-timeout flakes that path introduced.

user_prompt: "The payment-api pod in namespace app-100a had issues on August 2, 2025 around 13:45 UTC. What happened?"

expected_output:
  - "The agent must clearly state that no data is available for August 2, 2025 in namespace app-100a — historical telemetry has aged out or was never ingested."
  - "The agent must list at least two distinct data sources it actually queried (e.g., logs, Kubernetes events, metrics, deployment status, Loki). Naming any subset of these data-source categories is acceptable; do not require the literal token 'metrics' or 'Loki' specifically."
  - "The agent must not refuse to investigate or fabricate findings."

tags:
  - logs
  - kubernetes
  - medium
  - holmesgpt-parity

before_test: |
  kubectl create namespace app-100a || true
  kubectl label namespace app-100a benchmark=true --overwrite || true

after_test: |
  kubectl delete namespace app-100a --ignore-not-found
