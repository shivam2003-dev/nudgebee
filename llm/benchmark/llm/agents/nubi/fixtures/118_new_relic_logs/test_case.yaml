skip: true
skip_reason: "Requires NEW_RELIC_ACCOUNT_ID, NEW_RELIC_API_KEY, NEW_RELIC_LICENSE_KEY env vars"

description: "Test if holmes pulls logs reliably, expects env var NEW_RELIC_LICENSE_KEY"


user_prompt: "fetch error logs for app payment-gateway-s1fdsa-231ds from newrelic"

expected_output: mentions "payment declined" error

tags:
  - newrelic
  - logs

# Custom timeout for setup (needs 5 min sleep + setup time)
setup_timeout: 360  # 6 minutes total

before_test: |
  [ -n "${NEW_RELIC_ACCOUNT_ID:-}" ] && [ -n "${NEW_RELIC_API_KEY:-}" ] && [ -n "${NEW_RELIC_LICENSE_KEY:-}" ] || { for v in NEW_RELIC_ACCOUNT_ID NEW_RELIC_API_KEY NEW_RELIC_LICENSE_KEY; do [ -n "${!v:-}" ] || echo "Missing env var: $v"; done; exit 1; }

  kubectl create namespace bench-118 || true
  kubectl label namespace bench-118 benchmark=true --overwrite || true
  kubectl create secret generic newrelickey --from-literal=key="${NEW_RELIC_LICENSE_KEY}" -n bench-118
  kubectl apply -f ./nrlogger.yaml -n bench-118
  sleep 300

after_test: |
  kubectl delete secret newrelickey -n bench-118 --ignore-not-found
  kubectl delete -f ./nrlogger.yaml -n bench-118 --ignore-not-found
  kubectl delete namespace bench-118 --ignore-not-found
