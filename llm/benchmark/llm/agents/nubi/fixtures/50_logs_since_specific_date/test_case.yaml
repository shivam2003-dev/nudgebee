# Tests datetime handling: specific date reference
user_prompt: "What are the errors in the log-generator deployment in namespace bench-50? Use only logs to answer."
tags:
  - logs
  - medium
expected_output:
  - The errors found in the logs are "Database connection timeout after 30s" and "Failed to process payment - insufficient funds"
  - Should identify these as ERROR level entries from the log-generator pod

before_test: |
  kubectl create namespace bench-50 || true
  kubectl label namespace bench-50 benchmark=true --overwrite || true
  kubectl apply -f - <<'EOF'
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: log-generator
    namespace: bench-50
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: log-generator
    template:
      metadata:
        labels:
          app: log-generator
      spec:
        containers:
        - name: logger
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) INFO Health check OK"
                echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) ERROR Database connection timeout after 30s"
                echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) ERROR Failed to process payment - insufficient funds"
                echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) WARN Cache miss rate above threshold"
                sleep 10
              done
  EOF
  kubectl wait --for=condition=ready pod -l app=log-generator -n bench-50 --timeout=60s
  sleep 5

evaluation:
  correctness: 1

after_test: |
  kubectl delete namespace bench-50 --ignore-not-found
