# Tests datetime handling: "since last week"
user_prompt: "Show me the logs for the deployment `log-generator` in namespace bench-49 since last week"
tags:
  - logs
  - datetime
expected_output:
  - The logs should contain entries like "Request processed successfully" and "Slow query detected - 5.2s response time"
  - The agent must correctly interpret "last week" as a relative date and use it to filter logs

before_test: |
  kubectl create namespace bench-49 || true
  kubectl label namespace bench-49 benchmark=true --overwrite || true
  kubectl apply -f - <<'EOF'
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: log-generator
    namespace: bench-49
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: log-generator
    template:
      metadata:
        labels:
          app: log-generator
      spec:
        containers:
        - name: logger
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) INFO Request processed successfully"
                echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) WARN Slow query detected - 5.2s response time"
                sleep 10
              done
  EOF
  kubectl wait --for=condition=ready pod -l app=log-generator -n bench-49 --timeout=60s
  sleep 5

after_test: |
  kubectl delete namespace bench-49 --ignore-not-found
