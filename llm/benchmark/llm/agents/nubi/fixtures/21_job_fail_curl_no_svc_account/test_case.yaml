user_prompt: "Why get-data job failed?"
description: |
  The scenario here is that job is created without a service account. The job pod creation fails.
  Then the service account is being created. The job pod creation succeeds. and fails due to invalid host name.
  To succeed, Nubi needs to look beyond the initial misleading history of the job failing due to missing service account.
tags:
  - hard
expected_output: The output must state that either the exact URL http://kldsvklnsdiogjerkngernjk23432i90erfefjio.com/fsdkhjsadfjhsadfjsadu343 or the host kldsvklnsdiogjerkngernjk23432i90erfefjio.com could not be resolved to an IP address.
before_test: |
  kubectl create namespace bench-21 || true
  kubectl label namespace bench-21 benchmark=true --overwrite || true
  kubectl apply -f ./job-service-account-event/get-data-job.yaml -n bench-21
  timeout 10 bash -c 'until kubectl get events -n bench-21 --field-selector involvedObject.name=get-data | grep -q FailedCreate; do sleep 1; done; echo "FailedCreate event detected." || echo "No FailedCreate event detected within the timeout period."'
  kubectl apply -f ./job-service-account-event/get-data-service-account.yaml -n bench-21
  timeout 10 bash -c 'until kubectl get events -n bench-21 --field-selector involvedObject.name=get-data | grep -q SuccessfulCreate; do sleep 1; done; echo "SuccessfulCreate event detected." || echo "No SuccessfulCreate event detected within the timeout period."'
  kubectl wait --for=condition=failed job/get-data -n bench-21 --timeout=5s && echo "Job has failed." || echo "Job has not failed within the timeout period."
after_test: |
  kubectl delete -f ./job-service-account-event/get-data-job.yaml -n bench-21 --ignore-not-found
  kubectl delete -f ./job-service-account-event/get-data-service-account.yaml -n bench-21 --ignore-not-found
  kubectl delete namespace bench-21 --ignore-not-found
