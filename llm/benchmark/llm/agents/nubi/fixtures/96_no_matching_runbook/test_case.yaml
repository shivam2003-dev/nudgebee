# Originally HolmesGPT's no-matching-runbook test — it injected a fake runbook
# catalog (`runbooks.catalog`) and verified the agent didn't force-fit an
# irrelevant runbook to a custom-CRD problem. Our nubi runner doesn't read
# that field, so the runbook-framing is dead infra on our side.
#
# The underlying scenario is still useful: a WhaleWatcher CRD operator with
# an incomplete ClusterRole (missing update/patch on the CRD status). The
# agent must investigate and identify the RBAC permission denial.

user_prompt: "The custom CRD whale-watcher resources are not being reconciled by the operator in namespace app-96. Investigate why."

expected_output:
  - The agent must identify that the whale-operator ServiceAccount or ClusterRole lacks the necessary RBAC permissions.
  - Specifically, the whale-operator role is missing update and/or patch verbs on whalewatchers.ocean.io (or the /status subresource).
  - The answer should reference the operator's reconciliation failure due to permission denial (forbidden, not authorized, or RBAC denial).

tags:
  - kubernetes
  - rbac
  - medium
  - holmesgpt-parity

before_test: |
  kubectl create namespace app-96 || true
  kubectl label namespace app-96 benchmark=true --overwrite || true
  kubectl apply -f manifest.yaml
  sleep 30  # Let the operator start and CRD be created

after_test: |
  kubectl delete -f manifest.yaml --ignore-not-found
  kubectl delete namespace app-96 --force --grace-period=0 --ignore-not-found
