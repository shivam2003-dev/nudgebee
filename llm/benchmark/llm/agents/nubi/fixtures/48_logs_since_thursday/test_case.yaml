# Tests datetime handling: "since last Thursday"
user_prompt: "Show me the logs for the deployment `log-generator` in namespace bench-48 since last Thursday"
tags:
  - logs
  - datetime
  - medium
expected_output:
  - The logs should contain entries like "Application health check passed", "High memory usage detected", and "Database connection timeout"
  - The agent must correctly interpret "last Thursday" as a relative date and use it to filter logs

before_test: |
  kubectl create namespace bench-48 || true
  kubectl label namespace bench-48 benchmark=true --overwrite || true
  kubectl apply -f - <<'EOF'
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: log-generator
    namespace: bench-48
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: log-generator
    template:
      metadata:
        labels:
          app: log-generator
      spec:
        containers:
        - name: logger
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) INFO Application health check passed"
                echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) WARN High memory usage detected - 85% utilization"
                echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) ERROR Database connection timeout after 30s"
                sleep 10
              done
  EOF
  kubectl wait --for=condition=ready pod -l app=log-generator -n bench-48 --timeout=60s
  sleep 5

after_test: |
  kubectl delete namespace bench-48 --ignore-not-found
