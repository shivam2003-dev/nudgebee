# Tests ability to retrieve and filter k8s events
user_prompt: "What events happened recently in namespace bench-93?"
tags:
  - medium
  - kubernetes
expected_output:
  - Events should include Scheduled, Pulling, Created, and Started events for the event-generator pods
  - Should show that 2 replicas of event-generator were deployed in namespace bench-93

before_test: |
  kubectl create namespace bench-93 || true
  kubectl label namespace bench-93 benchmark=true --overwrite || true
  kubectl apply -f - <<'EOF'
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: event-generator
    namespace: bench-93
  spec:
    replicas: 2
    selector:
      matchLabels:
        app: event-generator
    template:
      metadata:
        labels:
          app: event-generator
      spec:
        containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c", "echo 'Event generator running'; sleep 3600"]
  EOF
  kubectl wait --for=condition=ready pod -l app=event-generator -n bench-93 --timeout=60s

after_test: |
  kubectl delete namespace bench-93 --ignore-not-found
