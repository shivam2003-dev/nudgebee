skip: true
skip_reason: "Requires NEW_RELIC_ACCOUNT_ID, NEW_RELIC_API_KEY, NEW_RELIC_LICENSE_KEY env vars"

description: "Test if holmes pulls New Relic metrics reliably"


user_prompt: "give me a graph of the custom newrelic metric sales.amount and the currency"

expected_output: |
   output contains something like << {"type": "newrelicql", "tool_name": "newrelic_execute_nrql_query", "random_key": "..."} >>
   the output mentions the currency is USD
   also mentions its over 100

tags:
  - newrelic
  - metrics

# Custom timeout for setup (needs 2 min sleep + setup time)
setup_timeout: 240  # 4 minutes total

# might need to run longer
before_test: |
  [ -n "${NEW_RELIC_ACCOUNT_ID:-}" ] && [ -n "${NEW_RELIC_API_KEY:-}" ] && [ -n "${NEW_RELIC_LICENSE_KEY:-}" ] || { for v in NEW_RELIC_ACCOUNT_ID NEW_RELIC_API_KEY NEW_RELIC_LICENSE_KEY; do [ -n "${!v:-}" ] || echo "Missing env var: $v"; done; exit 1; }
  kubectl create namespace bench-119 || true
  kubectl label namespace bench-119 benchmark=true --overwrite || true
  kubectl create secret generic newrelickey --from-literal=key="${NEW_RELIC_LICENSE_KEY}" -n bench-119
  kubectl apply -f ./sales.yaml -n bench-119
  sleep 120

after_test: |
  kubectl delete secret newrelickey -n bench-119 --ignore-not-found
  kubectl delete -f ./sales.yaml -n bench-119 --ignore-not-found
  kubectl delete namespace bench-119 --ignore-not-found
