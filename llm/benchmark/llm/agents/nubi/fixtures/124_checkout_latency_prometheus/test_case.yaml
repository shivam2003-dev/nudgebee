# Label-correlation latency scenario. A live setup would run a real Python
# checkout app + k6 load to generate metrics showing slower /checkout requests
# when a promo code is used. Nubi's metric catalog is fed by the OTel pipeline
# rather than direct VMServiceScrape, so the fixture pushes synthetic OTLP
# histogram data with the same observable shape (coupon=promotions slow,
# coupon=none fast). The test still measures the agent's ability to identify
# that the slowness correlates with the promo_code label, not just report
# that latency exists.

user_prompt: "The /checkout endpoint in namespace app-124 is experiencing high latency. Investigate why."

expected_output:
  - The answer must explicitly state that queries that include a promo code are slow or all slow requests include promo code.
  - Including a query that mentions promo code is not sufficient.

tags:
  - kubernetes
  - hard
  - chain-of-causation
  - prometheus

before_test: |
  set -e
  kubectl create namespace app-124 --save-config --dry-run=client -o yaml | kubectl apply -f - || true
  kubectl label namespace app-124 benchmark=true --overwrite || true
  kubectl apply -f metric-otel-pusher.yaml -n app-124

  echo "Waiting for OTLP pusher pod to be ready..."
  kubectl wait --for=condition=ready pod -l app=metric-otel-pusher -n app-124 --timeout=120s

  echo "Waiting for OTel pipeline to ingest the test metric..."
  sleep 120

after_test: |
  kubectl delete -f metric-otel-pusher.yaml -n app-124 --ignore-not-found
  kubectl delete namespace app-124 --ignore-not-found
