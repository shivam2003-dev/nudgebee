user_prompt: Find traces with duration longer than 1 second in the last 1 hour for
  'clickhouse' workload in 'nudgebee-agent' namespace.
expected_output:
- SELECT * FROM traces_view WHERE duration_ns > 1000 AND timestamp >= now() - interval
  1 hour AND workload_name LIKE '%clickhouse%' AND workload_namespace = 'nudgebee-agent';
- SELECT timestamp, workload_name, workload_namespace, resource, destination_workload_name,
  destination_workload_namespace, http_status_code, duration_ns FROM traces_view WHERE
  duration_ns > 1000 AND timestamp >= now() - interval 1 hour AND workload_name LIKE
  '%clickhouse%' AND workload_namespace = 'nudgebee-agent';
