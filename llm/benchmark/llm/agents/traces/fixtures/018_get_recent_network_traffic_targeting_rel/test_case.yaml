user_prompt: Get recent network traffic targeting 'relay-server' in 'nudgebee-test'
  namespace.
expected_output:
- SELECT * FROM traces_view WHERE destination_workload_name LIKE '%relay-server%'
  AND destination_workload_namespace = 'nudgebee-test' ORDER BY timestamp DESC LIMIT
  50;
- SELECT timestamp, workload_name, workload_namespace, resource, destination_workload_name,
  destination_workload_namespace, http_status_code, duration_ns FROM traces_view WHERE
  destination_workload_name LIKE '%relay-server%' AND destination_workload_namespace
  = 'nudgebee-test' ORDER BY timestamp DESC LIMIT 50;
