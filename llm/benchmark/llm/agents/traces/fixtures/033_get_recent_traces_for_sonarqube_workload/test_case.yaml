user_prompt: Get recent traces for 'sonarqube' workload in 'sonarqube' namespace.
expected_output:
- SELECT * FROM traces_view WHERE workload_name LIKE '%sonarqube%' AND workload_namespace
  = 'sonarqube' ORDER BY timestamp DESC LIMIT 50;
- SELECT timestamp, workload_name, workload_namespace, resource, destination_workload_name,
  destination_workload_namespace, http_status_code, duration_ns FROM traces_view WHERE
  workload_name LIKE '%sonarqube%' AND workload_namespace = 'sonarqube' ORDER BY timestamp
  DESC LIMIT 50;
