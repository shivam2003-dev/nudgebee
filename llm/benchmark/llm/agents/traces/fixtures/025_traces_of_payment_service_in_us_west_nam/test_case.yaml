user_prompt: Traces of 'payment-service' in 'us-west' namespace/region with duration
  > 100ms.
expected_output:
- SELECT * FROM traces_view WHERE workload_name LIKE '%payment-service%' AND workload_namespace
  LIKE '%us-west%' AND duration_ns > 100 ORDER BY timestamp DESC;
- SELECT timestamp, workload_name, workload_namespace, resource, destination_workload_name,
  destination_workload_namespace, http_status_code, duration_ns FROM traces_view WHERE
  workload_name LIKE '%payment-service%' AND workload_namespace LIKE '%us-west%' AND
  duration_ns > 100 ORDER BY timestamp DESC;
tags:
