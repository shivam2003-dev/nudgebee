user_prompt: What is the latency distribution (percentiles) for the '/audit' API resource?
expected_output:
- SELECT quantile(0.1)(duration_ns) as p10, quantile(0.5)(duration_ns) as p50, quantile(0.9)(duration_ns)
  as p90, avg(duration_ns) as avg_duration, count(*) as count FROM traces_view WHERE
  resource LIKE '%/audit%';
tags:
- command
- trace
