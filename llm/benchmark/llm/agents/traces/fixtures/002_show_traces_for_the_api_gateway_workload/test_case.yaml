user_prompt: Show traces for the 'api-gateway' workload with duration longer than
  500 milliseconds.
expected_output:
- SELECT * FROM traces_view WHERE workload_name LIKE '%api-gateway%' AND duration_ns
  > 500 ORDER BY timestamp DESC;
- SELECT timestamp, workload_name, workload_namespace, resource, destination_workload_name,
  destination_workload_namespace, http_status_code, duration_ns FROM traces_view WHERE
  workload_name LIKE '%api-gateway%' AND duration_ns > 500 ORDER BY timestamp DESC;
