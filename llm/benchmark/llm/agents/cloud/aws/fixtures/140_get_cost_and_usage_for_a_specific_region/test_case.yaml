user_prompt: Get cost and usage for a specific region (e.g., us-east-1) for the last
  month.
expected_output:
- 'aws ce get-cost-and-usage --time-period Start=$(date -d ''last month'' +%Y-%m-01)
  --End=$(date -d ''last month'' +%Y-%m-%d) --granularity MONTHLY --metrics BlendedCost
  --group-by Type=DIMENSION,Key=REGION --filter ''{\Dimensions\": {\"Key\": \"REGION\",
  \"Values\": [\"us-east-1\"]}}'''
tags:
- command
- aws
