user_prompt: Get cost and usage for a specific tag (e.g., Environment:Prod) for the
  last month.
expected_output:
- 'aws ce get-cost-and-usage --time-period Start=$(date -d ''last month'' +%Y-%m-01)
  --End=$(date -d ''last month'' +%Y-%m-%d) --granularity MONTHLY --metrics BlendedCost
  --group-by Type=TAG,Key=Environment --filter ''{\Tags\": {\"Key\": \"Environment\",
  \"Values\": [\"Prod\"]}}'''
tags:
- command
- aws
