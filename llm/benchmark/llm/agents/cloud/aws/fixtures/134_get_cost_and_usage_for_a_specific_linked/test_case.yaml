user_prompt: Get cost and usage for a specific linked account for the last month.
expected_output:
- aws ce get-cost-and-usage --time-period Start=$(date -d 'last month' +%Y-%m-01)
  --End=$(date -d 'last month' +%Y-%m-%d) --granularity MONTHLY --metrics BlendedCost
  --group-by Type=DIMENSION,Key=LINKED_ACCOUNT
tags:
- command
- aws
