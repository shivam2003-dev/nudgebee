user_prompt: Get cost and usage for a specific legal entity (e.g., Amazon Web Services,
  Inc.) for the last month.
expected_output:
- 'aws ce get-cost-and-usage --time-period Start=$(date -d ''last month'' +%Y-%m-01)
  --End=$(date -d ''last month'' +%Y-%m-%d) --granularity MONTHLY --metrics BlendedCost
  --group-by Type=DIMENSION,Key=LEGAL_ENTITY --filter ''{\Dimensions\": {\"Key\":
  \"LEGAL_ENTITY\", \"Values\": [\"Amazon Web Services, Inc.\"]}}'''
tags:
- command
- aws
