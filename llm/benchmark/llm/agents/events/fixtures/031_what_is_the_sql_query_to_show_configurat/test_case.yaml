user_prompt: What is the SQL query to show configuration changes that occurred last
  week?
expected_output:
- SELECT id, title, starts_at, subject_name   FROM events   WHERE finding_type = 'configuration_change'     AND
  starts_at >= date_trunc('week', CURRENT_DATE) - INTERVAL '1 week'     AND starts_at
  < date_trunc('week', CURRENT_DATE);
- SELECT * FROM events   WHERE finding_type = 'configuration_change'     AND starts_at
  >= date_trunc('week', CURRENT_DATE) - INTERVAL '1 week'     AND starts_at < date_trunc('week',
  CURRENT_DATE);
