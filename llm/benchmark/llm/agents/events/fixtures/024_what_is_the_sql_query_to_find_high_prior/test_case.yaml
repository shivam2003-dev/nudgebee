user_prompt: What is the SQL query to find HIGH priority 'KubeNodeNotReady' events?
expected_output:
- SELECT id, title, starts_at, status, subject_node   FROM events   WHERE priority
  = 'HIGH' AND aggregation_key = 'KubeNodeNotReady';
- SELECT * FROM events   WHERE priority = 'HIGH' AND aggregation_key = 'KubeNodeNotReady';
