user_prompt: What is the SQL query to show all Kubernetes Warning Events?
expected_output:
- SELECT id, title, description, starts_at, status, priority, subject_name, subject_namespace   FROM
  events   WHERE aggregation_key IN ('KubernetesWarningEvent', 'Kubernetes Warning
  Event');
- SELECT * FROM events   WHERE aggregation_key IN ('KubernetesWarningEvent', 'Kubernetes
  Warning Event');
