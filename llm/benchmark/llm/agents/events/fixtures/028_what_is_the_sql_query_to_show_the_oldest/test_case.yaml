user_prompt: What is the SQL query to show the oldest 5 firing events?
expected_output:
- SELECT id, title, starts_at, priority, subject_name   FROM events   WHERE status
  = 'FIRING'   ORDER BY starts_at ASC   LIMIT 5;
- SELECT * FROM events   WHERE status = 'FIRING'   ORDER BY starts_at ASC   LIMIT
  5;
