user_prompt: What is the SQL query to list all events indicating disk space exhaustion?
expected_output:
- SELECT id, title, starts_at, status, priority, subject_name, subject_node   FROM
  events   WHERE aggregation_key = 'DiskRunsOutOfSpace';
- SELECT * FROM events   WHERE aggregation_key = 'DiskRunsOutOfSpace';
