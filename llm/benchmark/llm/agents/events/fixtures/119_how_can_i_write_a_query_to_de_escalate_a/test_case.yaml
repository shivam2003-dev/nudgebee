user_prompt: How can I write a query to de-escalate all MEDIUM priority 'KubePodCrashLooping'
  events older than a day to LOW priority?
expected_output:
- UPDATE events SET priority = 'LOW', updated_at = NOW() WHERE priority = 'MEDIUM'
  AND aggregation_key = 'KubePodCrashLooping' AND starts_at < NOW() - INTERVAL '1
  day';
