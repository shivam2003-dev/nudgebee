user_prompt: What is the SQL query to find NGINX configuration failures?
expected_output:
- SELECT id, title, starts_at, status, priority, subject_name, subject_namespace,
  subject_node   FROM events   WHERE aggregation_key = 'NGINXConfigFailed';
- SELECT * FROM events   WHERE aggregation_key = 'NGINXConfigFailed';
