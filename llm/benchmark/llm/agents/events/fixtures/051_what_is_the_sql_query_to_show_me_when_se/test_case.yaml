user_prompt: What is the SQL query to show me when security group ingress rules were
  authorized?
expected_output:
- SELECT id, title, starts_at, status, priority, subject_name, subject_namespace,
  source   FROM events   WHERE aggregation_key = 'AuthorizeSecurityGroupIngress';
- SELECT * FROM events   WHERE aggregation_key = 'AuthorizeSecurityGroupIngress';
