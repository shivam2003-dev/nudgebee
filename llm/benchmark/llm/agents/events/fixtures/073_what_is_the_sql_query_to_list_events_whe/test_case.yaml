user_prompt: What is the SQL query to list events where EC2 instances were terminated?
expected_output:
- SELECT id, title, starts_at, priority, description, source   FROM events   WHERE
  aggregation_key IN ('TerminateInstances', 'TerminateInstanceInAutoScalingGroup');
- SELECT * FROM events   WHERE aggregation_key IN ('TerminateInstances', 'TerminateInstanceInAutoScalingGroup');
