user_prompt: What is the SQL query to list events where the subject is a 'pod' and
  the node is 'control-plane-1'?
expected_output:
- SELECT id, title, starts_at, status, priority, subject_name, subject_namespace   FROM
  events   WHERE subject_type = 'pod' AND subject_node = 'control-plane-1';
- SELECT * FROM events   WHERE subject_type = 'pod' AND subject_node = 'control-plane-1';
