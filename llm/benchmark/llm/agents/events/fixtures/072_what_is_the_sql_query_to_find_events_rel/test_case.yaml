user_prompt: What is the SQL query to find events related to Kubernetes normal events?
expected_output:
- SELECT id, title, description, starts_at, priority, subject_name, subject_namespace,
  subject_node   FROM events   WHERE aggregation_key = 'Kubernetes Normal Event';
- SELECT * FROM events   WHERE aggregation_key = 'Kubernetes Normal Event';
