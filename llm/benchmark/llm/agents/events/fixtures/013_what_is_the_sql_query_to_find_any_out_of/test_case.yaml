user_prompt: What is the SQL query to find any 'out of memory' events related to the
  'data-processor' job?
expected_output:
- SELECT id, title, starts_at, status, priority   FROM events   WHERE aggregation_key
  = 'pod_oom_killer_enricher' AND subject_type = 'job'     AND subject_name = 'data-processor';
- SELECT * FROM events   WHERE aggregation_key = 'pod_oom_killer_enricher' AND subject_type
  = 'job'     AND subject_name = 'data-processor';
