user_prompt: What is the SQL query to show high memory utilization alerts?
expected_output:
- SELECT id, title, starts_at, status, priority, subject_name, subject_node   FROM
  events   WHERE aggregation_key = 'HighMemoryUtilization';
- SELECT * FROM events   WHERE aggregation_key = 'HighMemoryUtilization';
