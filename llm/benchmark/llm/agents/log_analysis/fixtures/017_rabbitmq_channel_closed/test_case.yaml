  - The services-server in the nudgebee namespace is unable to publish to the RabbitMQ queue 'nudgebee.troubleshoot.events' due to a PRECONDITION_FAILED error. The channel is being closed because of an argument mismatch on x-message-ttl — the service is sending 86400000 (1 day) but the existing queue has 604800000 (7 days). All 5 reconnection attempts failed because the same mismatch occurs on every attempt. The root cause is that the queue was originally created with a 7-day TTL, but the service code or configuration was updated to use a 1-day TTL without deleting and recreating the queue. Suggested actions include either updating the service configuration to match the existing queue TTL (604800000), or manually deleting and recreating the queue with the new TTL via the RabbitMQ management console.
