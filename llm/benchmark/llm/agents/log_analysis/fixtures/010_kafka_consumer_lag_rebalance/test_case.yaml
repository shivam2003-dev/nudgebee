expected_output:
  - The fraud-detection service in the demo namespace has a Kafka consumer lag problem and is triggering repeated consumer group rebalances. The consumer on partitions orders-0 and orders-1 has accumulated over 146K messages of lag. Processing a batch of 500 records took 312 seconds, exceeding the max.poll.interval.ms of 300 seconds, causing the consumer to leave the group and triggering rebalances. The root cause is that the ML model inference used for fraud detection is timing out (30s per transaction), making batch processing too slow. Suggested actions include optimizing the ML model inference latency, reducing the max.poll.records to a smaller batch size, increasing max.poll.interval.ms, or scaling the fraud-detection service horizontally to distribute the load.
