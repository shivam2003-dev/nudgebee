user_prompt: What are the latest failures (status >= 400) for 'services-server' workload?
expected_output:
- SELECT * FROM traces_view WHERE workload_name LIKE '%services-server%' AND http_status_code
  >= 400 ORDER BY timestamp DESC LIMIT 10;
- SELECT timestamp, workload_name, workload_namespace, resource, destination_workload_name,
  destination_workload_namespace, http_status_code, duration_ns FROM traces_view WHERE
  workload_name LIKE '%services-server%' AND http_status_code >= 400 ORDER BY timestamp
  DESC LIMIT 10;
