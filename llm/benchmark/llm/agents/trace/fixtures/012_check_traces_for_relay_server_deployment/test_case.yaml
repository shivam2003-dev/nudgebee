user_prompt: Check traces for 'relay-server' deployment in 'nudgebee' namespace to
  identify unusual duration traces.
expected_output:
- SELECT * FROM traces_view WHERE workload_name LIKE '%relay-server%' AND workload_namespace
  = 'nudgebee' ORDER BY duration_ns DESC LIMIT 100;
- SELECT timestamp, workload_name, workload_namespace, resource, destination_workload_name,
  destination_workload_namespace, http_status_code, duration_ns FROM traces_view WHERE
  workload_name LIKE '%relay-server%' AND workload_namespace = 'nudgebee' ORDER BY
  duration_ns DESC LIMIT 100;
tags:
- command
- trace
