user_prompt: Show traces with only server-side errors (5xx) for 'backend-processor'
  in the last day.
expected_output:
- SELECT * FROM traces_view WHERE workload_name LIKE '%backend-processor%' AND http_status_code
  >= 500 AND timestamp >= now() - interval 1 day ORDER BY timestamp DESC;
- SELECT timestamp, workload_name, workload_namespace, resource, destination_workload_name,
  destination_workload_namespace, http_status_code, duration_ns FROM traces_view WHERE
  workload_name LIKE '%backend-processor%' AND http_status_code >= 500 AND timestamp
  >= now() - interval 1 day ORDER BY timestamp DESC;
