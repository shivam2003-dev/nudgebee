user_prompt: Get traces for 'ml-k8s-server' workload in 'nudgebee' namespace around
  3 hours 25 minutes ago.
expected_output:
- SELECT * FROM traces_view WHERE workload_name LIKE '%ml-k8s-server%' AND workload_namespace
  = 'nudgebee' AND timestamp BETWEEN (now() - interval 3 hour - interval 30 minute)
  AND (now() - interval 3 hour - interval 20 minute) ORDER BY timestamp DESC;
- SELECT timestamp, workload_name, workload_namespace, resource, destination_workload_name,
  destination_workload_namespace, http_status_code, duration_ns FROM traces_view WHERE
  workload_name LIKE '%ml-k8s-server%' AND workload_namespace = 'nudgebee' AND timestamp
  BETWEEN (now() - interval 3 hour - interval 30 minute) AND (now() - interval 3 hour
  - interval 20 minute) ORDER BY timestamp DESC;
