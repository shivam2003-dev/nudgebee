user_prompt: Find traces for 'user-service' that failed (status >= 400) AND took longer
  than 2 seconds.
expected_output:
- SELECT * FROM traces_view WHERE workload_name LIKE '%user-service%' AND http_status_code
  >= 400 AND duration_ns > 2000 ORDER BY timestamp DESC LIMIT 50;
- SELECT timestamp, workload_name, workload_namespace, resource, destination_workload_name,
  destination_workload_namespace, http_status_code, duration_ns FROM traces_view WHERE
  workload_name LIKE '%user-service%' AND http_status_code >= 400 AND duration_ns
  > 2000 ORDER BY timestamp DESC LIMIT 50;
