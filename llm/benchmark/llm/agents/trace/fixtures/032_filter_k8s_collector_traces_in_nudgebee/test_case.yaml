user_prompt: Filter 'k8s-collector' traces in 'nudgebee' (last day) with status 500
  OR latency > 2 seconds.
expected_output:
- SELECT * FROM traces_view WHERE workload_name LIKE '%k8s-collector%' AND workload_namespace
  = 'nudgebee' AND timestamp >= now() - interval 1 day AND (http_status_code = 500
  OR duration_ns > 2000) ORDER BY timestamp DESC;
- SELECT timestamp, workload_name, workload_namespace, resource, destination_workload_name,
  destination_workload_namespace, http_status_code, duration_ns FROM traces_view WHERE
  workload_name LIKE '%k8s-collector%' AND workload_namespace = 'nudgebee' AND timestamp
  >= now() - interval 1 day AND (http_status_code = 500 OR duration_ns > 2000) ORDER
  BY timestamp DESC;
