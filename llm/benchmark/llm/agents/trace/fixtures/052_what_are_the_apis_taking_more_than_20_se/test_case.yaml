user_prompt: What are the APIs taking more than 20 seconds in the 'nudgebee' namespace?
expected_output:
- SELECT * FROM traces_view WHERE workload_namespace = 'nudgebee' AND duration_ns
  > 20000 ORDER BY timestamp DESC LIMIT 50;
- SELECT timestamp, workload_name, workload_namespace, resource, destination_workload_name,
  destination_workload_namespace, http_status_code, duration_ns FROM traces_view WHERE
  workload_namespace = 'nudgebee' AND duration_ns > 20000 ORDER BY timestamp DESC
  LIMIT 50;
