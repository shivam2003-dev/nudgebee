user_prompt: Show traces with only client-side errors (4xx) for 'api-gateway' in the
  last 6 hours.
expected_output:
- SELECT * FROM traces_view WHERE workload_name LIKE '%api-gateway%' AND http_status_code
  >= 400 AND http_status_code < 500 AND timestamp >= now() - interval 6 hour ORDER
  BY timestamp DESC;
- SELECT timestamp, workload_name, workload_namespace, resource, destination_workload_name,
  destination_workload_namespace, http_status_code, duration_ns FROM traces_view WHERE
  workload_name LIKE '%api-gateway%' AND http_status_code >= 400 AND http_status_code
  < 500 AND timestamp >= now() - interval 6 hour ORDER BY timestamp DESC;
