user_prompt: Find traces where the destination workload name is missing or empty.
expected_output:
- SELECT * FROM traces_view WHERE destination_workload_name IS NULL OR destination_workload_name
  = '' ORDER BY timestamp DESC LIMIT 100;
- SELECT timestamp, workload_name, workload_namespace, resource, destination_workload_name,
  destination_workload_namespace, http_status_code, duration_ns FROM traces_view WHERE
  destination_workload_name IS NULL OR destination_workload_name = '' ORDER BY timestamp
  DESC LIMIT 100;
