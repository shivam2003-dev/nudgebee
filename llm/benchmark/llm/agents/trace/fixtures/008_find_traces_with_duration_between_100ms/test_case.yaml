user_prompt: Find traces with duration between 100ms and 200ms for the 'payment-service'.
expected_output:
- SELECT * FROM traces_view WHERE workload_name LIKE '%payment-service%' AND duration_ns
  BETWEEN 100 AND 200 ORDER BY timestamp DESC;
- SELECT timestamp, workload_name, workload_namespace, resource, destination_workload_name,
  destination_workload_namespace, http_status_code, duration_ns FROM traces_view WHERE
  workload_name LIKE '%payment-service%' AND duration_ns BETWEEN 100 AND 200 ORDER
  BY timestamp DESC;
