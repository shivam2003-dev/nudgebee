user_prompt: Find traces originating from 'frontend-service' and targeting 'backend-service'
  in the 'production' namespace.
expected_output:
- SELECT * FROM traces_view WHERE workload_name LIKE '%frontend-service%' AND destination_workload_name
  LIKE '%backend-service%' AND workload_namespace = 'production' AND destination_workload_namespace
  = 'production';
- SELECT timestamp, workload_name, workload_namespace, resource, destination_workload_name,
  destination_workload_namespace, http_status_code, duration_ns FROM traces_view WHERE
  workload_name LIKE '%frontend-service%' AND destination_workload_name LIKE '%backend-service%'
  AND workload_namespace = 'production' AND destination_workload_namespace = 'production';
tags:
