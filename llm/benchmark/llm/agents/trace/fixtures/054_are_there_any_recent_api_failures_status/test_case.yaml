user_prompt: Are there any recent API failures (status >= 400) or high latency (>
  1s) issues for 'app-dev' in 'nudgebee' namespace?
expected_output:
- SELECT * FROM traces_view WHERE workload_name LIKE '%app-dev%' AND workload_namespace
  = 'nudgebee' AND (http_status_code >= 400 OR duration_ns > 1000) ORDER BY timestamp
  DESC LIMIT 50;
- SELECT timestamp, workload_name, workload_namespace, resource, destination_workload_name,
  destination_workload_namespace, http_status_code, duration_ns FROM traces_view WHERE
  workload_name LIKE '%app-dev%' AND workload_namespace = 'nudgebee' AND (http_status_code
  >= 400 OR duration_ns > 1000) ORDER BY timestamp DESC LIMIT 50;
