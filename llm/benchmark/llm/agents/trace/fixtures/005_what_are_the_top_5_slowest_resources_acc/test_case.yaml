user_prompt: What are the top 5 slowest resources accessed in the last 6 hours across
  all namespaces?
expected_output:
- SELECT resource, avg(duration_ns) as avg_duration, count(*) as request_count FROM
  traces_view WHERE timestamp >= now() - interval 6 hour GROUP BY resource ORDER BY
  avg_duration DESC LIMIT 5;
