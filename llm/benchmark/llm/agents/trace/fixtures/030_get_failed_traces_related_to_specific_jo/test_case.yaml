user_prompt: Get failed traces related to specific job workloads (e.g., 'popeye-job',
  'helm-chart-upgrade') in 'default' namespace.
expected_output:
- SELECT * FROM traces_view WHERE workload_namespace = 'default' AND (workload_name
  LIKE '%popeye-job%' OR workload_name LIKE '%helm-chart-upgrade%' OR workload_name
  LIKE '%nudgebee-image-scanner%' OR workload_name LIKE '%postgres-migration-job%')
  AND http_status_code >= 400 ORDER BY timestamp DESC;
- SELECT timestamp, workload_name, workload_namespace, resource, destination_workload_name,
  destination_workload_namespace, http_status_code, duration_ns FROM traces_view WHERE
  workload_namespace = 'default' AND (workload_name LIKE '%popeye-job%' OR workload_name
  LIKE '%helm-chart-upgrade%' OR workload_name LIKE '%nudgebee-image-scanner%' OR
  workload_name LIKE '%postgres-migration-job%') AND http_status_code >= 400 ORDER
  BY timestamp DESC;
tags:
- command
- trace
