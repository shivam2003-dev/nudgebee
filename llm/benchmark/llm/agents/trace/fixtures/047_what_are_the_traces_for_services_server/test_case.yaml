user_prompt: What are the traces for 'services-server' with duration greater than
  1000 seconds?
expected_output:
- SELECT * FROM traces_view WHERE workload_name LIKE '%services-server%' AND duration_ns
  > 1000000 ORDER BY timestamp DESC;
- SELECT timestamp, workload_name, workload_namespace, resource, destination_workload_name,
  destination_workload_namespace, http_status_code, duration_ns FROM traces_view WHERE
  workload_name LIKE '%services-server%' AND duration_ns > 1000000 ORDER BY timestamp
  DESC;
