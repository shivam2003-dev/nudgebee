user_prompt: What are the most recent traces for 'k8s-collector' with errors (status
  >= 400)?
expected_output:
- SELECT * FROM traces_view WHERE workload_name LIKE '%k8s-collector%' AND http_status_code
  >= 400 ORDER BY timestamp DESC LIMIT 50;
- SELECT timestamp, workload_name, workload_namespace, resource, destination_workload_name,
  destination_workload_namespace, http_status_code, duration_ns FROM traces_view WHERE
  workload_name LIKE '%k8s-collector%' AND http_status_code >= 400 ORDER BY timestamp
  DESC LIMIT 50;
