user_prompt: What are the recent traces for 'llm-server' workload in 'nudgebee' namespace?
expected_output:
- SELECT * FROM traces_view WHERE workload_name LIKE '%llm-server%' AND workload_namespace
  = 'nudgebee' ORDER BY timestamp DESC LIMIT 50;
- SELECT timestamp, workload_name, workload_namespace, resource, destination_workload_name,
  destination_workload_namespace, http_status_code, duration_ns FROM traces_view WHERE
  workload_name LIKE '%llm-server%' AND workload_namespace = 'nudgebee' ORDER BY timestamp
  DESC LIMIT 50;
