AWSTemplateFormatVersion: '2010-09-09'
Description: >
  M01: ASG launches instances but ALB marks them all unhealthy.
  User complaint: "Auto Scaling keeps launching and terminating instances in a loop."
  Root cause: Launch template UserData runs app on port 3000, but target group
  health check targets port 8080.

Parameters:
  ScenarioMode:
    Type: String
    AllowedValues:
      - Broken
      - Fixed
    Default: Broken
    Description: >
      Broken = App listens on 3000, health check targets 8080.
      Fixed = App listens on 8080, health check targets 8080.

Conditions:
  IsFixed: !Equals [!Ref ScenarioMode, Fixed]

Resources:
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB security group for frontend
      VpcId: !ImportValue aws-agent-test-vpc-id
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: m01-frontend-alb-sg

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Instance security group for frontend
      VpcId: !ImportValue aws-agent-test-vpc-id
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref ALBSecurityGroup
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: m01-frontend-instance-sg

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: m01-frontend-lt
      LaunchTemplateData:
        InstanceType: t3.micro
        ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
        SecurityGroupIds:
          - !Ref InstanceSecurityGroup
        UserData:
          Fn::Base64: !Sub
            - |
              #!/bin/bash
              # Frontend React app - starts on port 3000
              cat > /home/ec2-user/server.py << 'PYEOF'
              from http.server import HTTPServer, BaseHTTPRequestHandler
              import json

              class Handler(BaseHTTPRequestHandler):
                  def do_GET(self):
                      if self.path == '/healthz':
                          self.send_response(200)
                          self.send_header('Content-Type', 'application/json')
                          self.end_headers()
                          self.wfile.write(json.dumps({"status": "ok"}).encode())
                      else:
                          self.send_response(200)
                          self.send_header('Content-Type', 'text/html')
                          self.end_headers()
                          self.wfile.write(b"<h1>Frontend App</h1>")
                  def log_message(self, format, *args):
                      pass

              HTTPServer(('0.0.0.0', ${AppPort}), Handler).serve_forever()
              PYEOF
              nohup python3 /home/ec2-user/server.py &
            - AppPort: !If [IsFixed, '8080', '3000']
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: m01-frontend-app
              - Key: Environment
                Value: production
              - Key: Application
                Value: storefront-ui

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: m01-frontend-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !ImportValue aws-agent-test-public-subnet-a
        - !ImportValue aws-agent-test-public-subnet-b
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: m01-frontend-alb

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: m01-frontend-tg
      Port: 8080
      Protocol: HTTP
      VpcId: !ImportValue aws-agent-test-vpc-id
      TargetType: instance
      HealthCheckPath: /healthz
      HealthCheckPort: '8080'
      HealthCheckIntervalSeconds: 15
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      Matcher:
        HttpCode: '200'

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  ASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: m01-frontend-asg
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MinSize: 1
      MaxSize: 2
      DesiredCapacity: 1
      VPCZoneIdentifier:
        - !ImportValue aws-agent-test-public-subnet-a
        - !ImportValue aws-agent-test-public-subnet-b
      TargetGroupARNs:
        - !Ref TargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 60
      Tags:
        - Key: Name
          Value: m01-frontend-asg
          PropagateAtLaunch: false

Outputs:
  ASGName:
    Description: Auto Scaling Group Name
    Value: !Ref ASG
  ALBDnsName:
    Description: ALB DNS Name
    Value: !GetAtt ALB.DNSName
  LaunchTemplateName:
    Description: Launch Template Name
    Value: m01-frontend-lt
  TargetGroupArn:
    Description: Target Group ARN
    Value: !Ref TargetGroup
  ScenarioMode:
    Description: Current scenario mode
    Value: !Ref ScenarioMode
