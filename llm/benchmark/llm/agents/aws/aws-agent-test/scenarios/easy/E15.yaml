AWSTemplateFormatVersion: '2010-09-09'
Description: >
  E15: EC2 instance NACL blocking all inbound traffic.
  User complaint: "EC2 instance 'e15-web-server-01' was working yesterday but now
  can't be reached at all. Security group looks fine with port 80 and 22 open.
  Nothing was changed on the instance."
  Root cause: A Network ACL rule was added to the subnet that explicitly denies
  all inbound traffic (rule 50 DENY ALL). NACLs are evaluated before security
  groups — the deny rule blocks traffic before SG rules are even checked.

Parameters:
  ScenarioMode:
    Type: String
    AllowedValues:
      - Broken
      - Fixed
    Default: Broken
    Description: >
      Broken = NACL has explicit DENY ALL rule before the ALLOW rules.
      Fixed = NACL allows standard traffic (HTTP, SSH).

Conditions:
  IsFixed: !Equals [!Ref ScenarioMode, Fixed]

Resources:
  WebSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !ImportValue aws-agent-test-vpc-id
      CidrBlock: 10.0.215.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: e15-web-subnet

  WebSubnetRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref WebSubnet
      # Use existing public route table by creating a new one with IGW route
      RouteTableId: !Ref WebRouteTable

  WebRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !ImportValue aws-agent-test-vpc-id
      Tags:
        - Key: Name
          Value: e15-web-rt

  WebRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref WebRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !ImportValue aws-agent-test-vpc-id
      # Note: This references the IGW. Since we can't import IGW directly,
      # we'll use NAT for private access testing. The NACL is the real issue.

  # THE BUG: Custom NACL with DENY ALL before any ALLOW
  WebNetworkAcl:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !ImportValue aws-agent-test-vpc-id
      Tags:
        - Key: Name
          Value: e15-web-nacl

  WebNaclAssociation:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref WebSubnet
      NetworkAclId: !Ref WebNetworkAcl

  # Rule 50: DENY ALL (only in Broken mode — blocks everything)
  NaclDenyAllInbound:
    Type: AWS::EC2::NetworkAclEntry
    Condition: IsFixed
    Properties:
      NetworkAclId: !Ref WebNetworkAcl
      RuleNumber: 100
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 80
        To: 80

  # In Broken mode, only have the deny rule (low number = evaluated first)
  NaclDenyAllInboundBroken:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref WebNetworkAcl
      RuleNumber: !If [IsFixed, 200, 50]
      Protocol: -1
      RuleAction: !If [IsFixed, allow, deny]
      Egress: false
      CidrBlock: 0.0.0.0/0

  # Allow all outbound (both modes)
  NaclAllowAllOutbound:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref WebNetworkAcl
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      Egress: true
      CidrBlock: 0.0.0.0/0

  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for web server - allows HTTP and SSH
      VpcId: !ImportValue aws-agent-test-vpc-id
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: e15-web-server-sg

  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      SubnetId: !Ref WebSubnet
      SecurityGroupIds:
        - !Ref WebSecurityGroup
      Tags:
        - Key: Name
          Value: e15-web-server-01
        - Key: Environment
          Value: production
        - Key: Application
          Value: marketing-site

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref WebServerInstance
  SecurityGroupId:
    Description: Security Group ID (looks correct)
    Value: !Ref WebSecurityGroup
  NetworkAclId:
    Description: Network ACL ID (has the blocking rule)
    Value: !Ref WebNetworkAcl
  SubnetId:
    Description: Subnet ID
    Value: !Ref WebSubnet
  ScenarioMode:
    Description: Current scenario mode
    Value: !Ref ScenarioMode
