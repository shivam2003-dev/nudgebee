AWSTemplateFormatVersion: '2010-09-09'
Description: >
  E02: EC2 No Internet - Instance in private subnet with no NAT Gateway route.
  User complaint: "My instance can't reach the internet, curl just hangs."
  Root cause: Private subnet route table has no 0.0.0.0/0 route to NAT Gateway.

Parameters:
  ScenarioMode:
    Type: String
    AllowedValues:
      - Broken
      - Fixed
    Default: Broken
    Description: >
      Broken = Private subnet has NO route to NAT Gateway.
      Fixed = Private subnet routes 0.0.0.0/0 to NAT Gateway.

Conditions:
  IsFixed: !Equals [!Ref ScenarioMode, Fixed]

Resources:
  # Scenario-specific private subnet (uses shared VPC, own route table for bug)
  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !ImportValue aws-agent-test-vpc-id
      CidrBlock: 10.0.102.0/24
      MapPublicIpOnLaunch: false
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: e02-inventory-private-1a

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !ImportValue aws-agent-test-vpc-id
      Tags:
        - Key: Name
          Value: e02-inventory-private-rt

  # This is the bug: in Broken mode, no route to NAT
  PrivateRouteToNat:
    Type: AWS::EC2::Route
    Condition: IsFixed
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !ImportValue aws-agent-test-nat-gateway-id

  PrivateSubnetRTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet
      RouteTableId: !Ref PrivateRouteTable

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for inventory worker instances
      VpcId: !ImportValue aws-agent-test-vpc-id
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !ImportValue aws-agent-test-vpc-cidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: e02-inventory-worker-sg
        - Key: Environment
          Value: production

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      SubnetId: !Ref PrivateSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      Tags:
        - Key: Name
          Value: e02-inventory-worker-01
        - Key: Environment
          Value: production
        - Key: Team
          Value: backend
        - Key: Application
          Value: inventory-sync

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
  PrivateSubnetId:
    Description: Private Subnet ID
    Value: !Ref PrivateSubnet
  PrivateRouteTableId:
    Description: Private Route Table ID
    Value: !Ref PrivateRouteTable
  SecurityGroupId:
    Description: Security Group ID
    Value: !Ref InstanceSecurityGroup
  ScenarioMode:
    Description: Current scenario mode
    Value: !Ref ScenarioMode
