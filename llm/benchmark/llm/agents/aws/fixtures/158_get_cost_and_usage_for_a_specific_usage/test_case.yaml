user_prompt: Get cost and usage for a specific usage type (e.g., BoxUsage) for the
  last month.
expected_output:
- 'aws ce get-cost-and-usage --time-period Start=$(date -d ''last month'' +%Y-%m-01)
  --End=$(date -d ''last month'' +%Y-%m-%d) --granularity MONTHLY --metrics BlendedCost
  --group-by Type=DIMENSION,Key=USAGE_TYPE --filter ''{\Dimensions\": {\"Key\": \"USAGE_TYPE\",
  \"Values\": [\"BoxUsage\"]}}'''
tags:
- command
- aws
