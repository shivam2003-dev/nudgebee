user_prompt: Get cost and usage for a specific record type (e.g., Credit) for the
  last month.
expected_output:
- 'aws ce get-cost-and-usage --time-period Start=$(date -d ''last month'' +%Y-%m-01)
  --End=$(date -d ''last month'' +%Y-%m-%d) --granularity MONTHLY --metrics BlendedCost
  --group-by Type=DIMENSION,Key=RECORD_TYPE --filter ''{\Dimensions\": {\"Key\": \"RECORD_TYPE\",
  \"Values\": [\"Credit\"]}}'''
tags:
- command
- aws
