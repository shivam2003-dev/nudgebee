user_prompt: 'Get cost and usage for a specific usage type group (e.g., EC2: Running
  Hours) for the last month.'
expected_output:
- 'aws ce get-cost-and-usage --time-period Start=$(date -d ''last month'' +%Y-%m-01)
  --End=$(date -d ''last month'' +%Y-%m-%d) --granularity MONTHLY --metrics BlendedCost
  --group-by Type=DIMENSION,Key=USAGE_TYPE_GROUP --filter ''{\Dimensions\": {\"Key\":
  \"USAGE_TYPE_GROUP\", \"Values\": [\"EC2: Running Hours\"]}}'''
tags:
- command
- aws
