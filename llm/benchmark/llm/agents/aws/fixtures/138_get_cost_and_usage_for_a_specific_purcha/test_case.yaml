user_prompt: Get cost and usage for a specific purchase option (e.g., Reserved) for
  the last month.
expected_output:
- 'aws ce get-cost-and-usage --time-period Start=$(date -d ''last month'' +%Y-%m-01)
  --End=$(date -d ''last month'' +%Y-%m-%d) --granularity MONTHLY --metrics BlendedCost
  --group-by Type=DIMENSION,Key=PURCHASE_OPTION --filter ''{\Dimensions\": {\"Key\":
  \"PURCHASE_OPTION\", \"Values\": [\"Reserved\"]}}'''
tags:
- command
- aws
