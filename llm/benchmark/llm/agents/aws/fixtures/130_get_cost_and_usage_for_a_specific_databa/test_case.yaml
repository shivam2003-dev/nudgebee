user_prompt: Get cost and usage for a specific database engine (e.g., mysql) for the
  last month.
expected_output:
- 'aws ce get-cost-and-usage --time-period Start=$(date -d ''last month'' +%Y-%m-01)
  --End=$(date -d ''last month'' +%Y-%m-%d) --granularity MONTHLY --metrics BlendedCost
  --group-by Type=DIMENSION,Key=DATABASE_ENGINE --filter ''{\Dimensions\": {\"Key\":
  \"DATABASE_ENGINE\", \"Values\": [\"mysql\"]}}'''
tags:
- command
- aws
