[mypy]
warn_return_any = true
warn_unused_configs = true
exclude = \.venv|\.ml-env|site-packages|llm/agents/nubi/fixtures
follow_imports = skip
warn_redundant_casts = true
warn_unused_ignores = true
no_implicit_reexport = true
disallow_untyped_defs = false
disallow_any_generics = false
check_untyped_defs = false
disallow_untyped_calls = false
strict = false
ignore_missing_imports = true
namespace_packages = false
files = server

[mypy-pydantic]
ignore_missing_imports = true

[mypy-boto3]
ignore_missing_imports = true

[mypy-pulp]
ignore_missing_imports = true

[mypy-kombu]
ignore_missing_imports = true

[mypy-kombu.*]
ignore_missing_imports = true

[mypy-amqp]
ignore_missing_imports = true

[mypy-amqp.*]
ignore_missing_imports = true

[mypy-prometheus_api_client]
ignore_missing_imports = true

[mypy-sklearn.*]
ignore_missing_imports = true

[mypy-pymupdf.*]
ignore_missing_imports = True

[mypy-langchain_azure_ai.*]
ignore_missing_imports = True

[mypy-datasets.*]
ignore_missing_imports = True

[mypy-huggingface_hub.*]
ignore_missing_imports = True

[mypy-tqdm.*]
ignore_missing_imports = True

[mypy-langchain_community.*]
ignore_missing_imports = True

[mypy-ragas.*]
ignore_missing_imports = True

[mypy-pytest-.*]
ignore_missing_imports = True

[mypy-langchain_aws]
ignore_missing_imports = True

[mypy-langchain_aws.*]
ignore_missing_imports = True

[mypy-yaml]
ignore_missing_imports = True

[mypy-llm.agents.nubi.fixtures.*]
ignore_errors = True